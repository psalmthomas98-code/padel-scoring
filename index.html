<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Udaan Padel Open — Live Scoring</title>
<meta name="theme-color" content="#0b0e12" />
<meta name="application-name" content="Udaan Padel Open" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Udaan Padel" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<style>
/* ── DARK BASE (admin) ── */
:root {
  --pitch:   #0b0e12;
  --surface: #131820;
  --raised:  #1a2130;
  --border:  #252e3d;
  --fire:    #f46b1a;
  --gold:    #f0b429;
  --chalk:   #eef2f7;
  --muted:   #5a6475;
  --dim:     #323b4a;
  --win:     #2db87a;
  --loss:    #e05252;
  --navy:    #1a2d6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--pitch); color: var(--chalk);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased;
}

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 24px; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--fire); padding: 32px 36px; width: 100%; max-width: 420px; }
.modal-title { font-family: Impact,'Arial Narrow',sans-serif; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); margin-bottom: 6px; }
.modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.modal-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.tour-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.tour-item { display: flex; align-items: center; justify-content: space-between; background: var(--raised); border: 1px solid var(--border); padding: 10px 14px; cursor: pointer; transition: border-color 0.12s; }
.tour-item:hover { border-color: var(--fire); }
.tour-item-name { font-size: 14px; font-weight: 600; }
.tour-item-date { font-size: 11px; color: var(--muted); }
.tour-item-arrow { color: var(--fire); font-size: 16px; }
.modal-btn { width: 100%; padding: 11px; background: var(--fire); border: none; color: white; font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: filter 0.15s; }
.modal-btn:hover { filter: brightness(1.15); }

/* ── SYNC ── */
.sync-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.sync-dot.ok     { background: var(--win); }
.sync-dot.saving { background: var(--gold); animation: blink .8s ease-in-out infinite; }
.sync-dot.error  { background: var(--loss); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.sync-status { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; }

/* ── FAB (lock button only, top-right when admin authed) ── */
.mode-fab { position: fixed; top: 10px; right: 12px; z-index: 300; display: flex; gap: 8px; pointer-events: none; }
.mode-fab > * { pointer-events: auto; }
.fab-btn.lock { background: rgba(10,8,8,.75); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.45); padding: 6px 13px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; backdrop-filter: blur(6px); border-radius: 3px; transition: all .15s; }
.fab-btn.lock:hover { background: rgba(255,255,255,.12); color: white; }
/* PIN modal */
.pin-input { width: 100%; background: var(--raised); border: 1px solid var(--border); color: var(--chalk); padding: 14px 16px; font-size: 28px; font-family: Impact,'Arial Narrow',sans-serif; letter-spacing: 12px; text-align: center; outline: none; margin-bottom: 12px; }
.pin-input:focus { border-color: var(--fire); }
.pin-error { color: var(--loss); font-size: 11px; letter-spacing: 1px; text-align: center; margin-bottom: 8px; min-height: 16px; }
/* Admin panel overlay */
#admin-panel { position: fixed; inset: 0; z-index: 200; background: #0b0e12; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; padding: 16px; display: none; }
#admin-panel.open { display: block; }
/* Admin button in banner */
.d-admin-btn { background: transparent; border: 1px solid rgba(244,107,26,.35); color: rgba(244,107,26,.7); padding: 6px 12px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all .15s; border-radius: 3px; white-space: nowrap; }
.d-admin-btn:hover { background: var(--fire); border-color: var(--fire); color: white; }
.d-admin-btn.authed { border-color: rgba(244,107,26,.6); color: var(--fire); }

/* ═══════════════════════════════════════════════════════
   DISPLAY VIEW — CINEMATIC DARK COURT THEME
═══════════════════════════════════════════════════════ */
#display-view {
  position: relative;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  overflow: hidden;
  background: #0a0603;
  color: white;
}

/* ── Court SVG background ── */
#court-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ── Content layers above canvas ── */
#display-view > *:not(#court-canvas) { position: relative; z-index: 2; }

/* ── Top banner ── */
.d-banner {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 20px;
  height: 64px;
  background: rgba(8,5,2,.97);
  border-bottom: 1px solid rgba(244,107,26,.35);
  box-shadow: 0 2px 24px rgba(0,0,0,.6);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}
.d-banner::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:2px;
  background: linear-gradient(90deg, transparent, var(--fire) 30%, var(--fire) 70%, transparent);
  opacity:.7;
}
.d-banner-left { display: flex; align-items: center; gap: 12px; }
.d-banner-center { display:flex; align-items:center; flex-direction:column; gap:3px; text-align:center; }
.d-banner-title {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: clamp(16px,1.8vw,26px);
  letter-spacing: 5px;
  text-transform: uppercase;
  color: white;
  line-height: 1;
}
.d-banner-sub {
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,.38);
}
.d-banner-right { display: flex; align-items: center; justify-content: flex-end; gap: 16px; }
.d-clock {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: clamp(22px,2.6vw,34px);
  letter-spacing: 2px;
  color: var(--fire);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.d-date { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.35); margin-top: 2px; text-align: right; }
.d-stage-tabs { display: flex; gap: 4px; }
.dstab { padding: 5px 14px; background: transparent; border: 1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.4); font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; border-radius: 3px; }
.dstab.active { background: var(--fire); border-color: var(--fire); color: white; }

/* ── Live board ── */
.d-live-zone {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 4vw;
}
.d-live-board {
  background: rgba(10,6,3,.75);
  border: 1px solid rgba(244,107,26,.3);
  border-top: 3px solid var(--fire);
  backdrop-filter: blur(8px);
  padding: 12px 24px 10px;
  box-shadow: 0 0 60px rgba(244,107,26,.08), inset 0 1px 0 rgba(255,255,255,.04);
}
.d-live-eyebrow {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.d-live-pip { width: 7px; height: 7px; background: var(--fire); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; flex-shrink: 0; box-shadow: 0 0 8px var(--fire); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
.d-live-label { font-size: 10px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); }
.d-live-context { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.35); margin-left: auto; }

/* Score layout */
.d-score-layout { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; }
.d-team-block { display: flex; flex-direction: column; gap: 2px; }
.d-team-block.left  { align-items: flex-end; text-align: right; }
.d-team-block.right { align-items: flex-start; }
.d-team-player { font-size: clamp(14px,1.8vw,24px); font-weight: 800; color: white; line-height: 1.2; text-shadow: 0 1px 8px rgba(0,0,0,.5); }

/* Center score */
.d-score-center { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.d-point-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,.35); margin-bottom: 1px; }
.d-point-row { display: flex; align-items: center; }
.d-upcoming-zone { padding:10px 24px; border-top:1px solid var(--border); }
.d-upcoming-header { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,.3); margin-bottom:8px; }
.d-upcoming-list { display:flex; flex-direction:column; gap:5px; }
.d-up-row { display:flex; align-items:center; gap:10px; padding:7px 10px; background:rgba(255,255,255,.03); border-radius:7px; border:1px solid rgba(255,255,255,.06); }
.d-up-badge { font-size:10px; font-weight:800; padding:3px 7px; border-radius:4px; letter-spacing:.5px; flex-shrink:0; }
.d-up-teams { flex:1; display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; color:var(--chalk); flex-wrap:wrap; }
.d-up-vs { font-size:9px; color:var(--muted); font-weight:400; }
.d-up-time { font-size:10px; color:var(--muted); white-space:nowrap; flex-shrink:0; }
.d-adv-row { display:flex; flex-direction:column; gap:4px; width:100%; }
.d-adv-team { display:flex; align-items:center; gap:8px; padding:5px 10px; border-radius:6px; }
.d-adv-team.adv-win { background:rgba(244,107,26,.18); border:1px solid rgba(244,107,26,.4); }
.d-adv-team.adv-lose { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); opacity:.55; }
.d-adv-label { font-family:Impact,'Arial Narrow',sans-serif; font-size:clamp(13px,1.8vw,20px); color:var(--fire); letter-spacing:1px; white-space:nowrap; }
.d-adv-names { font-size:clamp(11px,1.4vw,16px); font-weight:700; color:var(--chalk); letter-spacing:.3px; }
.d-point-num {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: clamp(64px,10vw,120px);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  min-width: clamp(68px,7.5vw,105px);
  text-align: center;
}
.d-point-num.normal { color: white; text-shadow: 0 0 40px rgba(255,255,255,.15); }
.d-point-num.adv    { color: var(--fire); text-shadow: 0 0 40px rgba(244,107,26,.6); }
.d-point-num.tb     { color: var(--gold); text-shadow: 0 0 40px rgba(240,180,41,.5); }
.d-point-dash { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(42px,6.5vw,80px); color: rgba(255,255,255,.2); padding: 0 8px; line-height: 1; }

.d-status-big {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: clamp(22px,3.5vw,46px);
  letter-spacing: 4px;
  text-transform: uppercase;
  text-align: center;
  padding: 8px 24px;
}
.d-status-big.deuce  { color: white; border: 2px solid rgba(255,255,255,.3); }
.d-status-big.golden { color: white; background: var(--fire); text-shadow: 0 0 20px rgba(244,107,26,.8); }
.d-status-big.done   { color: var(--gold); border: 2px solid var(--gold); text-shadow: 0 0 20px rgba(240,180,41,.5); }

.d-game-row { display: flex; align-items: center; gap: 5px; margin-top: 3px; padding-top: 5px; border-top: 1px solid rgba(255,255,255,.1); }
.d-game-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.3); }
.d-game-num { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(15px,2vw,26px); color: var(--fire); font-variant-numeric: tabular-nums; min-width: clamp(15px,1.8vw,22px); text-align: center; }
.d-game-dash { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(10px,1.4vw,18px); color: rgba(255,255,255,.2); padding: 0 3px; line-height: 1; }

/* Scoring buttons */
.d-score-btns { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; margin-top: 8px; }
.d-pt-btn { padding: 9px 12px; border: none; cursor: pointer; font-size: clamp(11px,1.1vw,14px); font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: filter 0.1s; }
.d-pt-btn:hover:not(:disabled) { filter: brightness(1.15); }
.d-pt-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.d-pt-btn.t1 { background: var(--fire); color: white; }
.d-pt-btn.t2 { background: white; color: #0a0603; }
.d-undo-btn { padding: 9px 14px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.06); color: rgba(255,255,255,.5); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background 0.12s; }
.d-undo-btn:hover:not(:disabled) { background: rgba(255,255,255,.12); color: white; }
.d-undo-btn:disabled { opacity: 0.2; cursor: not-allowed; }
.d-save-btn { display: block; width: 100%; margin-top: 6px; padding: 8px; border: none; background: var(--win); color: #041a0d; font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
.d-no-match { text-align: center; color: rgba(255,255,255,.3); font-size: 13px; letter-spacing: 3px; text-transform: uppercase; padding: 12px 0; }

/* ── Standings row ── */
.d-standings-zone {
  padding: 0 4vw 8px;
}
.d-standings-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.d-group-card {
  background: rgba(10,6,3,.8);
  border: 1px solid rgba(255,255,255,.08);
  backdrop-filter: blur(6px);
  display: flex; flex-direction: column; overflow: hidden;
}
.d-group-head { padding: 5px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,.07); flex-shrink: 0; }
.d-group-letter { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; line-height: 1; }
.d-group-sub { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.35); margin-top: 1px; }
.d-group-time { font-size: 8px; color: rgba(255,255,255,.3); text-align: right; line-height: 1.5; }
.d-group-table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.d-group-table thead th { font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.3); padding: 3px 7px; text-align: center; font-weight: 600; background: rgba(255,255,255,.03); }
.d-group-table thead th:nth-child(2) { text-align: left; }
.d-group-table tbody td { padding: 4px 7px; font-size: 10px; border-bottom: 1px solid rgba(255,255,255,.05); text-align: center; vertical-align: middle; }
.d-group-table tbody tr:last-child td { border-bottom: none; }
.d-group-table tbody td:nth-child(2) { text-align: left; font-weight: 700; color: white; }
.d-rank { font-family: Impact,'Arial Narrow',sans-serif; font-size: 13px; color: rgba(255,255,255,.2); width: 18px; }
.d-pts  { font-family: Impact,'Arial Narrow',sans-serif; font-size: 14px; color: var(--fire); }
.d-top2 .d-rank { color: var(--gold); }
.d-gd-pos { color: var(--win); font-weight: 700; }
.d-gd-neg { color: var(--loss); font-weight: 700; }
.d-gd-zero { color: rgba(255,255,255,.3); }
.d-played { font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.2); text-align: center; padding: 2px 7px; border-top: 1px solid rgba(255,255,255,.05); flex-shrink: 0; }
.d-results-wrap { border-top: 1px solid rgba(255,255,255,.05); flex-shrink: 0; max-height: 56px; overflow: hidden; }
.d-result-row { display: flex; align-items: center; gap: 4px; padding: 2px 7px; border-bottom: 1px solid rgba(255,255,255,.03); }
.d-result-row:last-child { border-bottom: none; }
.d-rt { font-size: 8px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.d-rs { font-family: Impact,'Arial Narrow',sans-serif; font-size: 11px; font-variant-numeric: tabular-nums; flex-shrink: 0; color: white; }

/* ── KO display ── */
.d-ko-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.d-ko-col { display: flex; flex-direction: column; }
.d-ko-round-head { font-family: Impact,'Arial Narrow',sans-serif; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); padding: 5px 10px; background: rgba(244,107,26,.1); border: 1px solid rgba(244,107,26,.2); border-bottom: none; text-align: center; }
.d-ko-body { flex: 1; display: flex; flex-direction: column; gap: 5px; padding: 6px; background: rgba(10,6,3,.75); border: 1px solid rgba(255,255,255,.07); backdrop-filter: blur(6px); }
.d-ko-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); padding: 6px 8px; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
.d-ko-card.is-live { border-color: var(--fire); background: rgba(244,107,26,.08); }
.d-ko-card.is-done { border-left: 3px solid var(--win); }
.d-ko-label { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: 2px; }
.d-ko-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.d-ko-name { font-size: clamp(8px,0.9vw,12px); font-weight: 700; color: white; flex: 1; line-height: 1.2; }
.d-ko-name.winner { color: var(--gold); }
.d-ko-name.tbd { color: rgba(255,255,255,.3); font-style: italic; font-weight: 400; }
.d-ko-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(12px,1.8vw,20px); color: var(--fire); font-variant-numeric: tabular-nums; }
.d-ko-score.winner { color: var(--gold); }
.d-ko-div { height: 1px; background: rgba(255,255,255,.08); margin: 1px 0; }

/* ── Sponsors strip ── */
.d-sponsors {
  background: rgba(10,6,3,.9);
  border-top: 1px solid rgba(244,107,26,.25);
  padding: 6px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  min-height: 52px;
}
.d-sponsor-item { display: flex; align-items: center; justify-content: center; height: 36px; }
.d-sponsor-img { height: 32px; width: auto; max-width: 120px; object-fit: contain; filter: brightness(1.1) contrast(0.9); }
.d-sponsor-text {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  border: 1px solid rgba(255,255,255,.1);
  padding: 4px 12px;
}
.d-sponsor-empty { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.2); }

/* ═══════════════════════════════════════════════════════
   ADMIN VIEW — DARK
═══════════════════════════════════════════════════════ */
/* admin panel base — fixed fullscreen overlay */
.admin-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px; border-bottom: 2px solid var(--fire);
  gap: 10px; background: var(--pitch); flex-shrink: 0;
  position: sticky; top: 0; z-index: 10;
}
.admin-title { font-family: Impact,'Arial Narrow',sans-serif; font-size: 22px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); }
.admin-topbar-meta { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
.admin-topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.admin-hdr-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--border); background: var(--surface); color: var(--chalk); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 6px; white-space: nowrap; transition: all .12s; min-height: 40px; }
.admin-hdr-btn:hover { border-color: var(--fire); color: var(--fire); }
.admin-hdr-btn.close { border-color: rgba(255,255,255,.15); color: var(--muted); }
.admin-hdr-btn.close:hover { background: var(--raised); color: var(--chalk); }
.admin-tabs {
  display: flex; overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid var(--border);
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
  background: var(--pitch); position: sticky; top: 58px; z-index: 9;
}
.admin-tabs::-webkit-scrollbar { display: none; }
.atab {
  flex: 0 0 auto; padding: 12px 16px; background: transparent; border: none;
  border-bottom: 3px solid transparent; color: var(--muted); font-size: 12px;
  font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: all .12s; white-space: nowrap; min-height: 48px;
}
.atab.active { color: var(--fire); border-bottom-color: var(--fire); }
.atab:hover:not(.active) { color: var(--chalk); background: var(--surface); }
.atab.ko-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.atab.sp-tab.active { color: var(--chalk); border-bottom-color: var(--chalk); }
.admin-content { padding: 16px; }
.admin-group-info { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
/* Player profile cards */
.player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.player-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
.player-card-head { display: flex; align-items: center; gap: 10px; }
.player-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: Impact,'Arial Narrow',sans-serif; font-size: 15px; font-weight: 700; flex-shrink: 0; }
.player-pos-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-top: 1px; }
.player-name-input { background: var(--raised); border: 1px solid var(--border); border-radius: 6px; color: var(--chalk); padding: 9px 10px; font-size: 14px; font-weight: 600; width: 100%; outline: none; }
.player-name-input:focus { border-color: var(--fire); }
.player-name-input::placeholder { color: var(--dim); font-weight: 400; }
/* Match list */
.admin-match-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.admin-match { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.admin-match.is-live { border-color: var(--fire); box-shadow: 0 0 0 1px var(--fire), 0 4px 20px rgba(244,107,26,.15); }
.admin-match.is-done { opacity: 0.6; }
.match-header { display: flex; align-items: center; gap: 10px; }
.match-order-btns { display:flex; gap:3px; margin-left:auto; flex-shrink:0; }
.order-btn { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.5); width:28px; height:28px; border-radius:4px; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.order-btn:hover:not(:disabled) { background:rgba(244,107,26,.2); border-color:var(--fire); color:var(--fire); }
.order-btn:disabled { opacity:.2; cursor:default; }
.match-num { font-size: 10px; color: var(--muted); font-weight: 700; background: var(--raised); border-radius: 4px; padding: 3px 7px; flex-shrink: 0; }
.admin-teams { flex: 1; font-size: 14px; line-height: 1.5; min-width: 0; overflow-wrap: anywhere; }
.admin-teams strong { font-weight: 700; color: var(--chalk); }
.admin-teams .vs { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin: 1px 0; }
.admin-teams .tbd-team { color: var(--muted); font-style: italic; }
.match-badge { font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 9px; border-radius: 20px; flex-shrink: 0; }
.badge-pending { background: var(--raised); color: var(--muted); }
.badge-live    { background: var(--fire); color: white; }
.badge-done    { background: rgba(45,184,122,.15); color: var(--win); border: 1px solid rgba(45,184,122,.3); }
/* Live scoring controls */
.live-scoring-ctrl { display: flex; flex-direction: column; gap: 10px; }
.score-display { text-align: center; padding: 6px 0; background: var(--raised); border-radius: 8px; }
.score-games { font-family: Impact,'Arial Narrow',sans-serif; font-size: 38px; color: var(--chalk); font-variant-numeric: tabular-nums; letter-spacing: 2px; line-height: 1; }
.score-points { font-size: 14px; font-weight: 700; color: var(--fire); letter-spacing: 1px; margin-top: 4px; }
.point-btns { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
.point-btn { padding: 0; border: none; cursor: pointer; font-size: 13px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: filter .1s; height: 64px; border-radius: 8px; line-height: 1.2; white-space: normal; }
.point-btn:active { filter: brightness(.85); }
.point-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.point-btn.t1 { background: var(--fire); color: white; }
.point-btn.t2 { background: #1a65a3; color: white; }
.ctrl-sep { font-size: 18px; color: var(--dim); text-align: center; }
.done-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: 28px; color: var(--chalk); text-align: center; padding: 10px; background: var(--raised); border-radius: 8px; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
.match-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.act-btn { padding: 10px 6px; border: none; cursor: pointer; font-size: 11px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; transition: filter .12s; border-radius: 6px; min-height: 44px; line-height: 1.2; white-space: normal; }
.act-btn:active { filter: brightness(.85); }
.act-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-golive  { background: var(--fire); color: white; }
.btn-save    { background: var(--win); color: #0a1f14; }
.btn-undo    { background: var(--raised); color: var(--chalk); border: 1px solid var(--border); }
.btn-stop    { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-result  { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-display { background: var(--raised); color: var(--chalk); border: 1px solid var(--border); }
.btn-winner  { background: rgba(240,180,41,.15); color: var(--gold); border: 1px solid rgba(240,180,41,.3); }
.btn-switch  { background: var(--raised); color: var(--gold); border: 1px solid rgba(240,180,41,.3); }
.btn-autofill { background: rgba(240,180,41,.15); color: var(--gold); border: 1px solid rgba(240,180,41,.3); }
/* Standings */
.admin-standings { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 4px; }
.admin-standings-title { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; font-weight: 700; }
.admin-st-table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; min-width: 380px; }
.admin-st-table th { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 8px 10px; text-align: center; background: var(--raised); font-weight: 700; }
.admin-st-table th:first-child { text-align: left; }
.admin-st-table td { padding: 10px; font-size: 13px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; font-variant-numeric: tabular-nums; }
.admin-st-table td:first-child { text-align: left; font-weight: 600; }
.admin-st-table tbody tr:last-child td { border-bottom: none; }
.admin-st-table .pts { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; color: var(--fire); }
.ko-section-head { font-family: Impact,'Arial Narrow',sans-serif; font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); padding: 8px 0; border-bottom: 1px solid rgba(240,180,41,.2); margin-bottom: 12px; margin-top: 24px; }
.ko-section-head:first-child { margin-top: 0; }
.ko-admin-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.ko-seeding-note { font-size: 10px; color: var(--muted); line-height: 1.6; }
/* Sponsor admin */
.sp-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.sp-preview { height: 40px; width: 80px; object-fit: contain; flex-shrink: 0; background: rgba(255,255,255,.05); border: 1px dashed var(--border); border-radius: 4px; }
.sp-input { flex: 1; background: var(--raised); border: 1px solid var(--border); border-radius: 6px; color: var(--chalk); padding: 8px 10px; font-size: 13px; outline: none; min-height: 44px; }
.sp-input:focus { border-color: var(--fire); }
.sp-input::placeholder { color: var(--muted); }
.sp-remove { background: rgba(224,82,82,.15); border: 1px solid rgba(224,82,82,.3); color: var(--loss); padding: 0 12px; cursor: pointer; font-size: 11px; font-weight: 800; border-radius: 6px; min-height: 44px; min-width: 44px; }
.sp-add { background: rgba(244,107,26,.12); border: 1px solid rgba(244,107,26,.3); color: var(--fire); padding: 12px 18px; cursor: pointer; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; border-radius: 8px; width: 100%; min-height: 48px; }
.sp-upload-btn { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.18); color: var(--chalk); padding: 0 12px; cursor: pointer; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; border-radius: 6px; min-height: 44px; }
.sp-upload-btn:hover { background: rgba(255,255,255,.12); }
.sp-file-input { display: none; }
.sp-logo-label { font-size: 10px; color: var(--muted); flex-shrink: 0; }

/* ── PHONE + LAPTOP COMPATIBILITY ─────────────────────────────────────────── */
html {
  width: 100%;
  min-height: 100%;
  background: var(--pitch);
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}
body {
  width: 100%;
  min-width: 320px;
  max-width: 100%;
  overflow-x: hidden;
}
button,
input,
label { touch-action: manipulation; }
button,
input { font: inherit; }
/* Kill iOS tap highlight everywhere */
* { -webkit-tap-highlight-color: transparent; }
/* Prevent text selection on interactive elements */
button, .atab, .dstab, .act-btn, .point-btn, .admin-hdr-btn, .order-btn, .fab-btn {
  user-select: none; -webkit-user-select: none;
}
/* Snappy press feedback on all tappable controls */
button:active, .atab:active, .dstab:active {
  transform: scale(0.96);
  transition: transform 0.06s;
}
.point-btn:active { transform: scale(0.93); transition: transform 0.06s; }
/* safe-area handled per breakpoint */

/* ── WINNERS PHOTO BACKDROP ───────────────────────────────────────────────── */
#winner-view {
  position: relative;
  isolation: isolate;
  width: 100%;
  height: 100dvh;
  min-height: 520px;
  overflow: hidden;
  color: #fff;
  background:
    radial-gradient(circle at 50% 38%, rgba(244,107,26,.30), transparent 32%),
    radial-gradient(circle at 8% 88%, rgba(26,45,107,.72), transparent 38%),
    linear-gradient(145deg, #080b12 0%, #111827 48%, #07090d 100%);
}
#winner-view::before,
#winner-view::after {
  content: '';
  position: absolute;
  z-index: -1;
  pointer-events: none;
}
#winner-view::before {
  inset: -35%;
  opacity: .22;
  transform: rotate(-12deg);
  background: repeating-linear-gradient(90deg, transparent 0 92px, rgba(255,255,255,.11) 93px 95px);
}
#winner-view::after {
  width: min(78vw, 980px);
  aspect-ratio: 1;
  left: 50%;
  top: 50%;
  transform: translate(-50%,-45%);
  border: 1px solid rgba(240,180,41,.16);
  border-radius: 50%;
  box-shadow: 0 0 0 90px rgba(240,180,41,.025), 0 0 0 180px rgba(240,180,41,.018);
}
.winner-top {
  position: absolute;
  inset: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: clamp(16px, 3vw, 34px) clamp(18px, 5vw, 70px);
}
.winner-brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
.winner-brand .brand-logo { width: clamp(48px, 5vw, 72px); height: clamp(48px, 5vw, 72px); object-fit: contain; border-radius: 14px; }
.winner-brand-name { font: 800 clamp(15px, 1.8vw, 25px)/1 'Arial Narrow',Arial,sans-serif; letter-spacing: .14em; text-transform: uppercase; }
.winner-brand-sub { margin-top: 5px; color: rgba(255,255,255,.48); font: 700 9px/1 Arial,sans-serif; letter-spacing: .26em; text-transform: uppercase; }
.winner-event { color: rgba(255,255,255,.58); font: 700 clamp(9px, 1vw, 12px)/1.3 Arial,sans-serif; letter-spacing: .25em; text-align: right; text-transform: uppercase; }
.winner-main {
  position: absolute;
  inset: clamp(100px, 14vh, 150px) clamp(18px, 5vw, 70px) clamp(74px, 11vh, 112px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.winner-stage { color: var(--gold); font: 800 clamp(11px, 1.25vw, 16px)/1 Arial,sans-serif; letter-spacing: .35em; text-transform: uppercase; }
.winner-word {
  margin-top: clamp(10px, 1.6vh, 18px);
  color: #fff;
  font: 900 clamp(70px, 13vw, 200px)/.78 Impact,'Arial Narrow',Arial,sans-serif;
  letter-spacing: .035em;
  text-transform: uppercase;
  text-shadow: 0 12px 45px rgba(0,0,0,.5), 0 0 55px rgba(244,107,26,.14);
}
.winner-accent { width: min(50vw, 560px); height: 3px; margin: clamp(22px, 4vh, 46px) auto clamp(20px, 3.6vh, 38px); background: linear-gradient(90deg, transparent, var(--fire) 22%, var(--gold) 50%, var(--fire) 78%, transparent); }
.winner-names { display: flex; align-items: center; justify-content: center; gap: clamp(14px, 2.2vw, 34px); max-width: 100%; }

<div id="root"></div><div id="overlays"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const FIREBASE_URL = 'https://padel-scoring-58d86-default-rtdb.asia-southeast1.firebasedatabase.app';
const TOURNAMENTS  = [
  { id: 'padel-july-2026',   label: 'Udaan Padel Open',   date: 'Jul 2026' },
  { id: 'padel-aug-2026',    label: 'Udaan Padel Open 2', date: 'Aug 2026' },
  { id: 'padel-sep-2026',    label: 'Udaan Padel Open 3', date: 'Sep 2026' },
];
const GROUPS = {
  A: { label:'Group A', letter:'A', date:'Sat 18 Jul', time:'4:00 – 6:30 PM',  color:'#f46b1a',
       teams:['Tushar & Udit','Angad & Chirag','Aviyank & Sam','Geetansh & Shaurya'] },
  B: { label:'Group B', letter:'B', date:'Sat 18 Jul', time:'6:30 – 9:00 PM',  color:'#e8a020',
       teams:['Abhinav & Udit','Varun M & Karan A','Karan & Dushyant','Rishi & Sahil'] },
  C: { label:'Group C', letter:'C', date:'Sat 18 Jul', time:'9:00 – 11:30 PM', color:'#f46b1a',
       teams:['Divyanshu & Vijay','Aashman & Aadi','Nishchay & Madhur','Bikram & Saharsh'] },
  D: { label:'Group D', letter:'D', date:'Sun 19 Jul', time:'3:00 – 5:30 PM',  color:'#e8a020',
       teams:['Harsh & Chirag','Ihit & Lakshya','Yajush & Arnav','Manish & Vishwas'] }
};
const KO_BRACKET = [
  {id:'qf1',round:'qf',label:'QF 1',date:'Sun 19 Jul',time:'5:30 PM'},
  {id:'qf2',round:'qf',label:'QF 2',date:'Sun 19 Jul',time:'5:30 PM'},
  {id:'qf3',round:'qf',label:'QF 3',date:'Sun 19 Jul',time:'5:30 PM'},
  {id:'qf4',round:'qf',label:'QF 4',date:'Sun 19 Jul',time:'5:30 PM'},
  {id:'sf1',round:'sf',label:'Semi Final 1',date:'Sun 19 Jul',time:'7:30 PM'},
  {id:'sf2',round:'sf',label:'Semi Final 2',date:'Sun 19 Jul',time:'7:30 PM'},
  {id:'final',round:'final',label:'Final',date:'Sun 19 Jul',time:'10:00 PM'},
];
function generateMatches() {
  const all=[];
  for (const [gk,g] of Object.entries(GROUPS))
    for (let i=0;i<g.teams.length;i++)
      for (let j=i+1;j<g.teams.length;j++)
        all.push({id:`${gk}${i}${j}`,group:gk,t1:i,t2:j});
  return all;
}
const MATCHES = generateMatches();
const POINT_LABELS = ['0','15','30','40'];

// ── FIREBASE ─────────────────────────────────────────────────────────────────
let currentTour = localStorage.getItem('udn_tour') || TOURNAMENTS[0].id;
let syncStatus = 'ok', saveTimer = null, es = null;
function dbPath() { return `${FIREBASE_URL}/${currentTour}.json`; }
function freshKO() { const ko={}; KO_BRACKET.forEach(m=>{ko[m.id]={t1:'',t2:''}}); return ko; }

async function pushToServer() {
  syncStatus='saving'; updateSyncDots();
  try {
    const res=await fetch(dbPath(),{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({results:S.results,live:S.live,ko:S.ko,sponsors:S.sponsors,names:S.names,players:S.players,presentation:S.presentation,displayTab:S.displayTab,matchOrder:S.matchOrder,logoutSerial:S.logoutSerial})});
    if(!res.ok) throw new Error(res.status);
    syncStatus='ok';
  } catch { syncStatus='error'; }
  saveTimer=null;
  updateSyncDots();
}
async function pullFromServer() {
  try { const r=await fetch(dbPath()); if(!r.ok) return null; return await r.json(); }
  catch { return null; }
}
function scheduleSave() { clearTimeout(saveTimer); saveTimer=setTimeout(pushToServer,400); }
function saveNow() { clearTimeout(saveTimer); saveTimer=null; pushToServer(); }

function startRealtime() {
  if (es) return;
  es=new EventSource(dbPath());
  es.addEventListener('put',e=>{
    const {data}=JSON.parse(e.data); if(!data) return;
    if(saveTimer) return; // this device is mid-save; skip to avoid overwriting local state
    if(S.live && S.adminOpen) return; // this device is actively scoring
    S.results=data.results||{};
    // Firebase drops null fields (adv, setWinner) — restore them so renderDisplay works correctly
    S.live=data.live ? Object.assign({setWinner:null,adv:null},data.live) : null;
    S.ko=data.ko||freshKO(); S.sponsors=data.sponsors||[]; S.names=data.names||defaultNames(); S.players=data.players||defaultPlayers();
    S.presentation=data.presentation||{mode:'standard',matchId:''};
    if(!S.adminOpen) S.displayTab=data.displayTab||'groups';
    S.matchOrder=data.matchOrder||{};
    const newSerial=data.logoutSerial||0;
    if(S.authed && localStorage.getItem(AUTH_KEY)!==String(newSerial)){ clearLocalAuth(); }
    S.logoutSerial=newSerial;
    syncStatus='ok'; updateSyncDots();
    try {
      document.getElementById('root').innerHTML=renderDisplay();
      renderOverlays(); // renderOverlays calls attachHandlers() — do NOT call again
    } catch(err) {
      console.error('SSE render error:',err.message,err.stack);
    }
  });
  es.onerror=()=>{
    syncStatus='error'; updateSyncDots();
    // Close and reconnect after 3s so a dropped connection doesn't stay dead
    try { es.close(); } catch(_){}
    es=null;
    setTimeout(startRealtime, 3000);
  };
}
function stopRealtime() { if(es){es.close();es=null;} }
function updateSyncDots() {
  document.querySelectorAll('.sync-dot').forEach(d=>d.className=`sync-dot ${syncStatus}`);
  document.querySelectorAll('.sync-text').forEach(t=>t.textContent=syncStatus==='ok'?'Live':syncStatus==='saving'?'Saving…':'Connection error');
}
async function switchTournament(id) {
  stopRealtime(); currentTour=id; localStorage.setItem('udn_tour',id);
  S.results={}; S.live=null; S.liveHistory=[]; S.ko=freshKO(); S.sponsors=[]; S.names=defaultNames(); S.presentation={mode:'standard',matchId:''};
  const data=await pullFromServer();
  if(data){S.results=data.results||{};S.live=data.live||null;S.ko=data.ko||freshKO();S.sponsors=data.sponsors||[];S.names=data.names||defaultNames();S.players=data.players||defaultPlayers();S.presentation=data.presentation||{mode:'standard',matchId:''};}
  S.adminOpen=false; render();
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const ADMIN_PIN = '1818';
function defaultNames(){
  const n={};
  for(const [k,g] of Object.entries(GROUPS)) n[k]=[...g.teams];
  return n;
}
function defaultPlayers(){
  const p={};
  for(const [k,g] of Object.entries(GROUPS)){
    p[k]=g.teams.map(t=>{const[p1,...rest]=t.split(' & ');return{p1:p1.trim(),p2:(rest.join(' & ')||'').trim()};});
  }
  return p;
}
const S = {
  authed:false, adminOpen:false, adminGroup:'A', adminTab:'group', displayTab:'groups',
  showPIN:false, pinError:'', showTourPicker:false,
  results:{}, live:null, liveHistory:[],
  ko:freshKO(), sponsors:[], names:defaultNames(), players:defaultPlayers(),
  presentation:{mode:'standard',matchId:''}, matchOrder:{}, logoutSerial:0
};
const AUTH_KEY='padel_admin_v1';
function checkPersistedAuth(serial){ if(localStorage.getItem(AUTH_KEY)===String(serial)) S.authed=true; }
function persistAuth(serial){ localStorage.setItem(AUTH_KEY,String(serial)); }
function clearLocalAuth(){ localStorage.removeItem(AUTH_KEY); S.authed=false; }
function getGroupMatches(gk){
  const all=MATCHES.filter(m=>m.group===gk);
  const order=S.matchOrder?.[gk];
  if(!order||!order.length) return all;
  return [...all].sort((a,b)=>{const ai=order.indexOf(a.id),bi=order.indexOf(b.id);return(ai<0?999:ai)-(bi<0?999:bi);});
}
function getTeam(gk,idx){
  if(S.players[gk]&&S.players[gk][idx]){
    const{p1,p2}=S.players[gk][idx];
    const def=GROUPS[gk].teams[idx].split(' & ');
    const n1=(p1||'').trim()||def[0]||'';
    const n2=(p2||'').trim()||def[1]||'';
    return n2?n1+' & '+n2:n1;
  }
  return (S.names[gk]&&S.names[gk][idx])||GROUPS[gk].teams[idx];
}
function freshLive(id) {
  return {matchId:id,games:[0,0],points:[0,0],deuce:false,adv:null,goldenPoint:false,tiebreak:false,tbPoints:[0,0],setWinner:null};
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function awardPoint(team) {
  if(!S.live||S.live.setWinner!==null) return;
  S.liveHistory.push(JSON.stringify(S.live));
  if(S.liveHistory.length>50) S.liveHistory.shift();
  const L=S.live;
  if(L.tiebreak) {
    L.tbPoints[team]++;
    if(L.tbPoints[team]>=7&&L.tbPoints[team]-L.tbPoints[1-team]>=2){L.games[team]++;L.setWinner=team;}
    saveNow();render();return;
  }
  if(L.deuce) {
    if(L.goldenPoint)       { winGame(team); }
    else if(L.adv===null)   { L.adv=team; }
    else if(L.adv===team)   { winGame(team); }
    else { L.adv=null; L.goldenPoint=true; }
    saveNow();render();return;
  }
  L.points[team]++;
  if(L.points[0]>=3&&L.points[1]>=3){L.deuce=true;L.adv=null;L.goldenPoint=false;L.points=[3,3];saveNow();render();return;}
  if(L.points[team]>=4) winGame(team);
  saveNow();render();
}
function winGame(team) {
  const L=S.live;
  L.games[team]++;L.points=[0,0];L.deuce=false;L.adv=null;L.goldenPoint=false;L.tiebreak=false;L.tbPoints=[0,0];
  const[g0,g1]=L.games,max=Math.max(g0,g1);
  if(max>=6){
    if(max-Math.min(g0,g1)>=2&&max<=7){L.setWinner=g0>g1?0:1;return;}
    if(g0===6&&g1===6){L.tiebreak=true;L.tbPoints=[0,0];}
  }
}
function undoPoint() { if(!S.liveHistory.length)return; S.live=JSON.parse(S.liveHistory.pop()); saveNow();render(); }

// ── KO HELPERS ────────────────────────────────────────────────────────────────
function getKOTeams(id){const s=S.ko[id]||{t1:'',t2:''};return{t1:s.t1||'',t2:s.t2||''};}
function getKOMeta(id){return KO_BRACKET.find(m=>m.id===id);}
function koWinner(id){const r=S.results[id];if(!r)return null;const{t1,t2}=getKOTeams(id);return r.s1>r.s2?t1:t2;}
function propagateKOWinners(){
  const w=id=>koWinner(id);
  if(!S.ko.sf1)S.ko.sf1={t1:'',t2:''};
  if(!S.ko.sf2)S.ko.sf2={t1:'',t2:''};
  if(!S.ko.final)S.ko.final={t1:'',t2:''};
  if(w('qf1'))S.ko.sf1.t1=w('qf1');if(w('qf2'))S.ko.sf1.t2=w('qf2');
  if(w('qf3'))S.ko.sf2.t1=w('qf3');if(w('qf4'))S.ko.sf2.t2=w('qf4');
  if(w('sf1'))S.ko.final.t1=w('sf1');if(w('sf2'))S.ko.final.t2=w('sf2');
}
function autoFillQF(){
  const seed=k=>{const st=getStandings(k);return[st[0].team,st[1].team];};
  const[a1,a2]=seed('A'),[b1,b2]=seed('B'),[c1,c2]=seed('C'),[d1,d2]=seed('D');
  S.ko.qf1={t1:a1,t2:d2};S.ko.qf2={t1:b1,t2:c2};
  S.ko.qf3={t1:c1,t2:b2};S.ko.qf4={t1:d1,t2:a2};
  propagateKOWinners();scheduleSave();render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function inlineGameScore(L){
  if(L.setWinner!==null)return'–';
  if(L.tiebreak)return`TB ${L.tbPoints[0]}–${L.tbPoints[1]}`;
  if(L.deuce){if(L.goldenPoint)return'GOLDEN';return L.adv!==null?'ADV':'Deuce';}
  return`${POINT_LABELS[L.points[0]]}–${POINT_LABELS[L.points[1]]}`;
}
function getStandings(gk){
  const rows=GROUPS[gk].teams.map((t,i)=>({team:getTeam(gk,i),idx:i,pts:0,gw:0,gl:0,mp:0}));
  MATCHES.filter(m=>m.group===gk).forEach(m=>{
    const r=S.results[m.id];if(!r)return;
    const r1=rows[m.t1],r2=rows[m.t2];
    r1.mp++;r2.mp++;r1.gw+=r.s1;r1.gl+=r.s2;r2.gw+=r.s2;r2.gl+=r.s1;
    if(r.s1>r.s2)r1.pts+=3;else if(r.s2>r.s1)r2.pts+=3;
  });
  rows.forEach(r=>r.gd=r.gw-r.gl);
  return rows.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gw-a.gw||a.gl-b.gl);
}
function fmtClock(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtDate(){return new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();}
function tourLabel(){return TOURNAMENTS.find(t=>t.id===currentTour)?.label||currentTour;}
function getLiveTeams(){
  if(!S.live)return null;
  const id=S.live.matchId;
  const gm=MATCHES.find(m=>m.id===id);
  if(gm){const g=GROUPS[gm.group];return{t1:getTeam(gm.group,gm.t1),t2:getTeam(gm.group,gm.t2),context:`${g.label} · ${g.date} · ${g.time}`};}
  const km=getKOMeta(id);
  if(km){const{t1,t2}=getKOTeams(id);return{t1,t2,context:`${km.label} · ${km.date} · ${km.time}`};}
  return null;
}

        <div class="tour-item-arrow">${t.id===currentTour?'✓':'›'}</div>
      </div>`).join('')}
    </div>

  </div>

// ── RENDER: DISPLAY ───────────────────────────────────────────────────────────
function getCompletedMatchDetails(id){
  const res=S.results[id];
  if(!res||res.s1===res.s2) return null;
  const gm=MATCHES.find(m=>m.id===id);
  if(gm){
    const g=GROUPS[gm.group], groupMatches=MATCHES.filter(m=>m.group===gm.group);
    const t1=getTeam(gm.group,gm.t1),t2=getTeam(gm.group,gm.t2),winner=res.s1>res.s2?t1:t2;
    return {id,t1,t2,winner,res,stage:'Group Stage',match:`${g.label} · Match ${groupMatches.findIndex(m=>m.id===id)+1}`,date:g.date};
  }
  const meta=getKOMeta(id);
  if(!meta) return null;
  const {t1,t2}=getKOTeams(id);
  if(!t1||!t2) return null;
  const winner=res.s1>res.s2?t1:t2;
  const stage=meta.round==='final'?'Championship Final':meta.round==='sf'?'Semi Final':'Quarter Final';
  return {id,t1,t2,winner,res,stage,match:meta.label,date:meta.date};
}

function renderWinnerDisplay(details){
  const names=details.winner.split(' & ');
  const sponsorLogos=S.sponsors.filter(sp=>sp.url).slice(0,4);
  return`<div id="winner-view">
    ${S.authed?`<button data-action="hideWinner" style="position:absolute;top:14px;right:14px;z-index:10;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:7px 14px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:4px;backdrop-filter:blur(6px)">✕ Close</button>`:''}
    <div class="winner-top">
      <div class="winner-brand">
        ${udaanLogo(70)}
        <div><div class="winner-brand-name">Udaan Padel Open</div><div class="winner-brand-sub">Presented by Udaan Sports Academy</div></div>
      </div>
      <div class="winner-event">${details.date}<br>${details.match}</div>
    </div>
    <main class="winner-main">
      <div class="winner-stage">${details.stage} · ${details.match}</div>
      <div class="winner-word">Winners</div>
      <div class="winner-accent"></div>
      <div class="winner-names">
        <div class="winner-player">${names[0]||''}</div>
        ${names[1]?`<div class="winner-amp">&amp;</div><div class="winner-player">${names[1]}</div>`:''}
      </div>
      <div class="winner-score">Final score · ${details.res.s1}–${details.res.s2}</div>
    </main>
    <div class="winner-footer">
      <div>Udaan Sports Academy · Padel Open</div>
      <div class="winner-footer-sponsors">${sponsorLogos.map(sp=>`<img src="${sp.url}" alt="${sp.name||'Sponsor'}">`).join('')}</div>
      <div>Victory captured here</div>
    </div>
  </div>`;
}

function renderUpcoming(){
  const liveId=S.live?.matchId;
  // Group stage: unplayed, non-live matches
  const upcoming=Object.keys(GROUPS).flatMap(gk=>getGroupMatches(gk)).filter(m=>!S.results[m.id]&&m.id!==liveId).slice(0,6);
  if(!upcoming.length) return '';
  const rows=upcoming.map(m=>{
    const g=GROUPS[m.group];
    const t1=getTeam(m.group,m.t1), t2=getTeam(m.group,m.t2);
    return`<div class="d-up-row">
      <div class="d-up-badge" style="background:${g.color}22;color:${g.color};border:1px solid ${g.color}44">${g.letter}</div>
      <div class="d-up-teams"><span>${t1}</span><span class="d-up-vs">vs</span><span>${t2}</span></div>
      <div class="d-up-time">${g.time}</div>
    </div>`;
  }).join('');
  return`<div class="d-upcoming-zone">
  <div class="d-upcoming-header">UP NEXT</div>
  <div class="d-upcoming-list">${rows}</div>
</div>`;
}

function renderDisplayLiveBoard(liveTeams){
  const L=S.live, {t1,t2,context}=liveTeams;
  const p1=t1.split(' & '),p2=t2.split(' & ');
  const setDone=L.setWinner!==null;
  let centerHtml='';
  if(setDone){
    const winnerNames=L.setWinner===0?p1:p2;
    centerHtml=`<div class="set-won-moment" role="status" aria-label="Set won by ${winnerNames.join(' and ')}.">
      <div class="set-won-emblem" aria-hidden="true"><span>✓</span></div>
      <div class="set-won-copy">
        <div class="set-won-kicker">Match Complete</div>
        <div class="set-won-title">Set Won</div>
        <div class="set-won-names">${winnerNames.map(n=>`<span>${n}</span>`).join('<b>&amp;</b>')}</div>
      </div>
    </div>`;
  } else if(L.tiebreak){
    centerHtml=`<div class="d-point-label">TIEBREAK</div>
    <div class="d-point-row">
      <div class="d-point-num tb">${L.tbPoints[0]}</div>
      <div class="d-point-dash">–</div>
      <div class="d-point-num tb">${L.tbPoints[1]}</div>
    </div>`;
  } else if(L.deuce){
    if(L.goldenPoint){
      centerHtml=`<div class="golden-moment" role="status" aria-label="Golden point. Next point wins the game.">
        <div class="golden-emblem" aria-hidden="true"><span>⚡</span></div>
        <div class="golden-copy">
          <div class="golden-kicker">Sudden Death</div>
          <div class="golden-title">Golden <span>Point</span></div>
          <div class="golden-sub">Next point wins the game</div>
        </div>
      </div>`;
    } else if(L.adv!==null){
      const advTeam=L.adv===0?p1:p2;
      const oppTeam=L.adv===0?p2:p1;
      centerHtml=`<div class="d-point-label">ADVANTAGE</div>
      <div class="d-adv-row">
        <div class="d-adv-team adv-win">
          <div class="d-adv-label">AD</div>
          <div class="d-adv-names">${advTeam.join(' & ')}</div>
        </div>
        <div class="d-adv-team adv-lose">
          <div class="d-adv-names">${oppTeam.join(' & ')}</div>
        </div>
      </div>`;
    } else {
      centerHtml=`<div class="d-status-big deuce">DEUCE</div>`;
    }
  } else {
    const pl=POINT_LABELS;
    centerHtml=`<div class="d-point-label">CURRENT GAME</div>
    <div class="d-point-row">
      <div class="d-point-num normal">${pl[L.points[0]]}</div>
      <div class="d-point-dash">–</div>
      <div class="d-point-num normal">${pl[L.points[1]]}</div>
    </div>`;
  }
  return`
<div class="d-live-eyebrow">
  ${setDone?'':`<div class="d-live-pip"></div>`}
  <div class="d-live-label" style="${setDone?'color:#f0b429':''}">${setDone?'MATCH COMPLETE':'LIVE'}</div>
  <div class="d-live-context">${context}</div>
</div>
<div class="d-score-layout ${L.goldenPoint?'golden-active':''} ${setDone?'set-won-active':''}">
  <div class="d-team-block left">${p1.map(n=>`<div class="d-team-player">${n}</div>`).join('')}</div>
  <div class="d-score-center">
    ${centerHtml}
    <div class="d-game-row">
      <div class="d-game-label">GAMES</div>
      <div class="d-game-num">${L.games[0]}</div>
      <div class="d-game-dash">–</div>
      <div class="d-game-num">${L.games[1]}</div>
    </div>
  </div>
  <div class="d-team-block right">${p2.map(n=>`<div class="d-team-player">${n}</div>`).join('')}</div>
</div>
<div class="d-live-footer ${setDone?'complete':''}" aria-live="polite">
  <span class="d-live-footer-pip"></span>
  <span>${setDone?'Match complete · Awaiting result confirmation':'Live score · Updates automatically'}</span>
</div>`;
}

    <div>
      <div class="admin-title">Manage</div>
      <div class="admin-topbar-meta">${tourLabel()} · <span class="sync-dot ${syncStatus}" style="display:inline-block;margin-right:3px"></span><span class="sync-text">${syncStatus==='ok'?'Live':syncStatus==='saving'?'Saving…':'Error'}</span></div>
    </div>
    <div class="admin-topbar-right">
      <button class="admin-hdr-btn" data-action="openPicker">⇄ Switch</button>
      <button class="admin-hdr-btn" style="border-color:rgba(224,82,82,.4);color:var(--loss)" data-action="logoutAll">⊗ Logout All</button>
      <button class="admin-hdr-btn close" data-action="closeAdmin">✕ Close</button>
    </div>
  </div>
  <div class="admin-tabs">
    ${Object.keys(GROUPS).map(k=>{const hasLive=S.live&&MATCHES.find(m=>m.id===S.live.matchId)?.group===k;return`<button class="atab ${isGroup&&k===S.adminGroup?'active':''}" data-action="setGroup" data-group="${k}">${GROUPS[k].label}${hasLive?'<span style="color:#f46b1a;font-size:8px;vertical-align:middle;margin-left:3px">●</span>':''}</button>`;}).join('')}
    <button class="atab ko-tab ${isKO?'active':''}" data-action="setKOTab">Knockout</button>
    <button class="atab ${isPL?'active':''}" data-action="setPLTab">Players</button>
    <button class="atab ${isWN?'active':''}" data-action="setWNTab">Winners</button>
  </div>
  <div class="admin-content">
    ${isKO?renderKnockoutAdmin():isWN?renderWinnersAdmin():isPL?renderPlayersAdmin():renderGroupAdmin(g,standings)}
  </div>
  ${S.showTourPicker?renderTourPicker():''}
</div>`;
}


// ── HANDLERS ──────────────────────────────────────────────────────────────────
function attachHandlers(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    const a=el.dataset.action;
    if(a==='editName') {
      el.addEventListener('input',()=>{
        const gk=el.dataset.gk, ti=+el.dataset.ti;
        if(!S.names[gk]) S.names[gk]=[...GROUPS[gk].teams];
        S.names[gk][ti]=el.value;
        scheduleSave();
      });
      return;
    }
    if(a==='editPlayer') {
      el.addEventListener('input',()=>{
        const gk=el.dataset.gk, ti=+el.dataset.ti, slot=el.dataset.slot;
        if(!S.players[gk]) S.players[gk]=defaultPlayers()[gk];
        if(!S.players[gk][ti]) S.players[gk][ti]={p1:'',p2:''};
        S.players[gk][ti][slot]=el.value;
        scheduleSave();
      });
      return;
    }
    el.addEventListener('click',async()=>{
      if(a==='showPIN')    {S.showPIN=true;S.pinError='';render();setTimeout(()=>document.getElementById('pin-field')?.focus(),50);}
      if(a==='closePIN')   {S.showPIN=false;render();}
      if(a==='submitPIN')  {
        const val=document.getElementById('pin-field')?.value||'';
        if(val===ADMIN_PIN){S.authed=true;S.showPIN=false;S.adminOpen=true;S.pinError='';persistAuth(S.logoutSerial);render();}
        else{S.pinError='Incorrect PIN';document.getElementById('pin-error').textContent=S.pinError;document.getElementById('pin-field').value='';document.getElementById('pin-field').focus();}
      }
      if(a==='lockAdmin')  {clearLocalAuth();S.adminOpen=false;renderOverlays();}
      if(a==='logoutAll')  {S.logoutSerial=(S.logoutSerial||0)+1;clearLocalAuth();S.adminOpen=false;scheduleSave();render();}
      if(a==='openAdmin')  {S.adminOpen=true;if(S.live){const lm=MATCHES.find(m=>m.id===S.live.matchId);if(lm){S.adminGroup=lm.group;S.adminTab='group';}}renderOverlays();}
      if(a==='closeAdmin') {S.adminOpen=false;renderOverlays();}
      if(a==='setGroup')   {S.adminGroup=el.dataset.group;S.adminTab='group';render();}
      if(a==='moveMatchUp'||a==='moveMatchDown'){
        const gk=S.adminGroup;
        const ms=getGroupMatches(gk);
        const ids=ms.map(m=>m.id);
        const i=ids.indexOf(el.dataset.id);
        if(a==='moveMatchUp'&&i>0){[ids[i-1],ids[i]]=[ids[i],ids[i-1]];}
        if(a==='moveMatchDown'&&i<ids.length-1){[ids[i],ids[i+1]]=[ids[i+1],ids[i]];}
        if(!S.matchOrder) S.matchOrder={};
        S.matchOrder[gk]=ids;
        scheduleSave();render();
      }
      if(a==='setKOTab')   {S.adminTab='knockout';render();}
      if(a==='setWNTab')   {S.adminTab='winners';render();}
      if(a==='setPLTab')   {S.adminTab='players';render();}
      if(a==='dispTab')    {S.displayTab=el.dataset.tab;scheduleSave();render();}
      if(a==='openPicker') {S.showTourPicker=true;render();}
      if(a==='closePicker'){S.showTourPicker=false;render();}
      if(a==='pickTour')   {S.showTourPicker=false;await switchTournament(el.dataset.id);}
      if(a==='goLive')   {S.live=freshLive(el.dataset.id);S.liveHistory=[];S.presentation={mode:'standard',matchId:''};scheduleSave();render();}
      if(a==='stopLive') {S.live=null;S.liveHistory=[];scheduleSave();render();}
      if(a==='pt')       {awardPoint(+el.dataset.team);}
      if(a==='undo')     {undoPoint();}
      if(a==='save')     {S.results[el.dataset.id]={s1:S.live.games[0],s2:S.live.games[1]};S.live=null;S.liveHistory=[];scheduleSave();render();}
      if(a==='dispSave') {
        S.results[el.dataset.id]={s1:S.live.games[0],s2:S.live.games[1]};
        S.live=null;S.liveHistory=[];
        if(getKOMeta(el.dataset.id))propagateKOWinners();
        scheduleSave();render();
      }
      if(a==='showWinner')    {S.presentation={mode:'winner',matchId:el.dataset.id};scheduleSave();render();}
      if(a==='hideWinner')    {S.presentation={mode:'standard',matchId:''};scheduleSave();render();}
      if(a==='undoResult')    {delete S.results[el.dataset.id];if(S.presentation.matchId===el.dataset.id)S.presentation={mode:'standard',matchId:''};scheduleSave();render();}
      if(a==='autoFillQF')    {autoFillQF();}
      if(a==='koGoLive')      {S.live=freshLive(el.dataset.id);S.liveHistory=[];S.presentation={mode:'standard',matchId:''};scheduleSave();render();}
      if(a==='koSave')        {S.results[el.dataset.id]={s1:S.live.games[0],s2:S.live.games[1]};S.live=null;S.liveHistory=[];propagateKOWinners();scheduleSave();render();}
      if(a==='koUndoResult')  {delete S.results[el.dataset.id];if(S.presentation.matchId===el.dataset.id)S.presentation={mode:'standard',matchId:''};propagateKOWinners();scheduleSave();render();}
    });
  });
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('pin-field')===document.activeElement)document.querySelector('[data-action="submitPIN"]')?.click();});
setInterval(()=>{const el=document.getElementById('clock-el');if(el)el.textContent=fmtClock();},1000);

// ── RENDER ────────────────────────────────────────────────────────────────────
// Display view goes into #root; overlays (admin panel, PIN, FAB) go into #overlays
// This ensures fixed-position overlays are never inside a stacking context.
function render(){
  try {
    document.getElementById('root').innerHTML=renderDisplay();
  } catch(e) {
    document.getElementById('root').innerHTML=`<div style="color:red;padding:20px">Render error: ${e.message}</div>`;
    console.error('render error',e);
  }
  renderOverlays(); // renderOverlays already calls attachHandlers()
  startRealtime();
}
function renderOverlays(){
  const prev = document.getElementById('admin-panel');
  const scrollTop = prev ? prev.scrollTop : 0;
  try {
    document.getElementById('overlays').innerHTML=renderAdminPanel()+renderPINModal()+renderFAB();
  } catch(e) {
    console.error('overlay error',e);
  }
  attachHandlers();
  const next = document.getElementById('admin-panel');
  if(next && scrollTop) next.scrollTop = scrollTop;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async()=>{
  const data=await pullFromServer();
  if(data){
    S.results=data.results||{};
    S.live=data.live ? Object.assign({setWinner:null,adv:null},data.live) : null;
    S.ko=data.ko||freshKO(); S.sponsors=data.sponsors||[]; S.names=data.names||defaultNames();
    S.players=data.players||defaultPlayers(); S.presentation=data.presentation||{mode:'standard',matchId:''};
    S.displayTab=data.displayTab||'groups'; S.matchOrder=data.matchOrder||{};
    S.logoutSerial=data.logoutSerial||0; checkPersistedAuth(S.logoutSerial);
  }
  render();
})();
</script>
</body>
</html>
