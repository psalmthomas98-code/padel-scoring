<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Udaan Padel Open — Live Scoring</title>
<style>
/* ── DARK BASE (admin) ── */
:root {
  --pitch:   #0b0e12;
  --surface: #131820;
  --raised:  #1a2130;
  --border:  #252e3d;
  --fire:    #f46b1a;
  --gold:    #f0b429;
  --chalk:   #eef2f7;
  --muted:   #5a6475;
  --dim:     #323b4a;
  --win:     #2db87a;
  --loss:    #e05252;
  --navy:    #1a2d6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--pitch); color: var(--chalk);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased;
}

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 24px; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--fire); padding: 32px 36px; width: 100%; max-width: 420px; }
.modal-title { font-family: Impact,'Arial Narrow',sans-serif; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); margin-bottom: 6px; }
.modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.modal-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.tour-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.tour-item { display: flex; align-items: center; justify-content: space-between; background: var(--raised); border: 1px solid var(--border); padding: 10px 14px; cursor: pointer; transition: border-color 0.12s; }
.tour-item:hover { border-color: var(--fire); }
.tour-item-name { font-size: 14px; font-weight: 600; }
.tour-item-date { font-size: 11px; color: var(--muted); }
.tour-item-arrow { color: var(--fire); font-size: 16px; }
.modal-btn { width: 100%; padding: 11px; background: var(--fire); border: none; color: white; font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: filter 0.15s; }
.modal-btn:hover { filter: brightness(1.15); }

/* ── SYNC ── */
.sync-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.sync-dot.ok     { background: var(--win); }
.sync-dot.saving { background: var(--gold); animation: blink .8s ease-in-out infinite; }
.sync-dot.error  { background: var(--loss); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.sync-status { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; }

/* ── FAB ── */
.mode-fab { position: fixed; bottom: 14px; right: 14px; z-index: 300; }
.fab-btn { background: rgba(10,8,8,.85); border: 1px solid rgba(244,107,26,.4); color: var(--fire); padding: 8px 16px; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; backdrop-filter: blur(4px); }
.fab-btn:hover { background: var(--fire); color: white; }

/* ═══════════════════════════════════════════════════════
   DISPLAY VIEW — CINEMATIC DARK COURT THEME
═══════════════════════════════════════════════════════ */
#display-view {
  position: relative;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  overflow: hidden;
  background: #0a0603;
  color: white;
}

/* ── Court SVG background ── */
#court-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ── Content layers above canvas ── */
#display-view > *:not(#court-canvas) { position: relative; z-index: 2; }

/* ── Top banner ── */
.d-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px 8px;
  background: linear-gradient(180deg, rgba(10,6,3,.95) 0%, rgba(10,6,3,.7) 100%);
  border-bottom: 2px solid var(--fire);
}
.d-banner-left { display: flex; align-items: center; gap: 12px; }
.d-banner-title {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: clamp(18px,2.4vw,32px);
  letter-spacing: 4px;
  text-transform: uppercase;
  color: white;
  line-height: 1;
  text-shadow: 0 0 30px rgba(244,107,26,.5);
}
.d-banner-sub {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,.45);
  margin-top: 3px;
}
.d-banner-right { display: flex; align-items: center; gap: 16px; }
.d-clock {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: clamp(24px,3vw,38px);
  letter-spacing: 2px;
  color: var(--fire);
  font-variant-numeric: tabular-nums;
  line-height: 1;
  text-shadow: 0 0 20px rgba(244,107,26,.6);
}
.d-date { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.4); margin-top: 2px; text-align: right; }
.d-stage-tabs { display: flex; }
.dstab { padding: 5px 12px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.45); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.dstab:first-child { border-right: none; }
.dstab.active { background: var(--fire); border-color: var(--fire); color: white; }

/* ── Live board ── */
.d-live-zone {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 4vw;
}
.d-live-board {
  background: rgba(10,6,3,.75);
  border: 1px solid rgba(244,107,26,.3);
  border-top: 3px solid var(--fire);
  backdrop-filter: blur(8px);
  padding: 12px 24px 10px;
  box-shadow: 0 0 60px rgba(244,107,26,.08), inset 0 1px 0 rgba(255,255,255,.04);
}
.d-live-eyebrow {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.d-live-pip { width: 7px; height: 7px; background: var(--fire); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; flex-shrink: 0; box-shadow: 0 0 8px var(--fire); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
.d-live-label { font-size: 10px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); }
.d-live-context { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.35); margin-left: auto; }

/* Score layout */
.d-score-layout { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; }
.d-team-block { display: flex; flex-direction: column; gap: 2px; }
.d-team-block.left  { align-items: flex-end; text-align: right; }
.d-team-block.right { align-items: flex-start; }
.d-team-player { font-size: clamp(14px,1.8vw,24px); font-weight: 800; color: white; line-height: 1.2; text-shadow: 0 1px 8px rgba(0,0,0,.5); }

/* Center score */
.d-score-center { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.d-point-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,.35); margin-bottom: 1px; }
.d-point-row { display: flex; align-items: center; }
.d-point-num {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: clamp(64px,10vw,120px);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  min-width: clamp(68px,7.5vw,105px);
  text-align: center;
}
.d-point-num.normal { color: white; text-shadow: 0 0 40px rgba(255,255,255,.15); }
.d-point-num.adv    { color: var(--fire); text-shadow: 0 0 40px rgba(244,107,26,.6); }
.d-point-num.tb     { color: var(--gold); text-shadow: 0 0 40px rgba(240,180,41,.5); }
.d-point-dash { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(42px,6.5vw,80px); color: rgba(255,255,255,.2); padding: 0 8px; line-height: 1; }

.d-status-big {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: clamp(22px,3.5vw,46px);
  letter-spacing: 4px;
  text-transform: uppercase;
  text-align: center;
  padding: 8px 24px;
}
.d-status-big.deuce  { color: white; border: 2px solid rgba(255,255,255,.3); }
.d-status-big.golden { color: white; background: var(--fire); text-shadow: 0 0 20px rgba(244,107,26,.8); }
.d-status-big.done   { color: var(--gold); border: 2px solid var(--gold); text-shadow: 0 0 20px rgba(240,180,41,.5); }

.d-game-row { display: flex; align-items: center; gap: 5px; margin-top: 3px; padding-top: 5px; border-top: 1px solid rgba(255,255,255,.1); }
.d-game-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.3); }
.d-game-num { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(15px,2vw,26px); color: var(--fire); font-variant-numeric: tabular-nums; min-width: clamp(15px,1.8vw,22px); text-align: center; }
.d-game-dash { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(10px,1.4vw,18px); color: rgba(255,255,255,.2); padding: 0 3px; line-height: 1; }

/* Scoring buttons */
.d-score-btns { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; margin-top: 8px; }
.d-pt-btn { padding: 9px 12px; border: none; cursor: pointer; font-size: clamp(11px,1.1vw,14px); font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: filter 0.1s; }
.d-pt-btn:hover:not(:disabled) { filter: brightness(1.15); }
.d-pt-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.d-pt-btn.t1 { background: var(--fire); color: white; }
.d-pt-btn.t2 { background: white; color: #0a0603; }
.d-undo-btn { padding: 9px 14px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.06); color: rgba(255,255,255,.5); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background 0.12s; }
.d-undo-btn:hover:not(:disabled) { background: rgba(255,255,255,.12); color: white; }
.d-undo-btn:disabled { opacity: 0.2; cursor: not-allowed; }
.d-save-btn { display: block; width: 100%; margin-top: 6px; padding: 8px; border: none; background: var(--win); color: #041a0d; font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
.d-no-match { text-align: center; color: rgba(255,255,255,.3); font-size: 13px; letter-spacing: 3px; text-transform: uppercase; padding: 12px 0; }

/* ── Standings row ── */
.d-standings-zone {
  padding: 0 4vw 8px;
}
.d-standings-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.d-group-card {
  background: rgba(10,6,3,.8);
  border: 1px solid rgba(255,255,255,.08);
  backdrop-filter: blur(6px);
  display: flex; flex-direction: column; overflow: hidden;
}
.d-group-head { padding: 5px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,.07); flex-shrink: 0; }
.d-group-letter { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; line-height: 1; }
.d-group-sub { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.35); margin-top: 1px; }
.d-group-time { font-size: 8px; color: rgba(255,255,255,.3); text-align: right; line-height: 1.5; }
.d-group-table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.d-group-table thead th { font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.3); padding: 3px 7px; text-align: center; font-weight: 600; background: rgba(255,255,255,.03); }
.d-group-table thead th:nth-child(2) { text-align: left; }
.d-group-table tbody td { padding: 4px 7px; font-size: 10px; border-bottom: 1px solid rgba(255,255,255,.05); text-align: center; vertical-align: middle; }
.d-group-table tbody tr:last-child td { border-bottom: none; }
.d-group-table tbody td:nth-child(2) { text-align: left; font-weight: 700; color: white; }
.d-rank { font-family: Impact,'Arial Narrow',sans-serif; font-size: 13px; color: rgba(255,255,255,.2); width: 18px; }
.d-pts  { font-family: Impact,'Arial Narrow',sans-serif; font-size: 14px; color: var(--fire); }
.d-top2 .d-rank { color: var(--gold); }
.d-gd-pos { color: var(--win); font-weight: 700; }
.d-gd-neg { color: var(--loss); font-weight: 700; }
.d-gd-zero { color: rgba(255,255,255,.3); }
.d-played { font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.2); text-align: center; padding: 2px 7px; border-top: 1px solid rgba(255,255,255,.05); flex-shrink: 0; }
.d-results-wrap { border-top: 1px solid rgba(255,255,255,.05); flex-shrink: 0; max-height: 56px; overflow: hidden; }
.d-result-row { display: flex; align-items: center; gap: 4px; padding: 2px 7px; border-bottom: 1px solid rgba(255,255,255,.03); }
.d-result-row:last-child { border-bottom: none; }
.d-rt { font-size: 8px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.d-rs { font-family: Impact,'Arial Narrow',sans-serif; font-size: 11px; font-variant-numeric: tabular-nums; flex-shrink: 0; color: white; }

/* ── KO display ── */
.d-ko-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.d-ko-col { display: flex; flex-direction: column; }
.d-ko-round-head { font-family: Impact,'Arial Narrow',sans-serif; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); padding: 5px 10px; background: rgba(244,107,26,.1); border: 1px solid rgba(244,107,26,.2); border-bottom: none; text-align: center; }
.d-ko-body { flex: 1; display: flex; flex-direction: column; gap: 5px; padding: 6px; background: rgba(10,6,3,.75); border: 1px solid rgba(255,255,255,.07); backdrop-filter: blur(6px); }
.d-ko-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); padding: 6px 8px; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
.d-ko-card.is-live { border-color: var(--fire); background: rgba(244,107,26,.08); }
.d-ko-card.is-done { border-left: 3px solid var(--win); }
.d-ko-label { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: 2px; }
.d-ko-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.d-ko-name { font-size: clamp(8px,0.9vw,12px); font-weight: 700; color: white; flex: 1; line-height: 1.2; }
.d-ko-name.winner { color: var(--gold); }
.d-ko-name.tbd { color: rgba(255,255,255,.3); font-style: italic; font-weight: 400; }
.d-ko-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(12px,1.8vw,20px); color: var(--fire); font-variant-numeric: tabular-nums; }
.d-ko-score.winner { color: var(--gold); }
.d-ko-div { height: 1px; background: rgba(255,255,255,.08); margin: 1px 0; }

/* ── Sponsors strip ── */
.d-sponsors {
  background: rgba(10,6,3,.9);
  border-top: 1px solid rgba(244,107,26,.25);
  padding: 6px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  min-height: 52px;
}
.d-sponsor-item { display: flex; align-items: center; justify-content: center; height: 36px; }
.d-sponsor-img { height: 32px; width: auto; max-width: 120px; object-fit: contain; filter: brightness(1.1) contrast(0.9); }
.d-sponsor-text {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  border: 1px solid rgba(255,255,255,.1);
  padding: 4px 12px;
}
.d-sponsor-empty { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.2); }

/* ═══════════════════════════════════════════════════════
   ADMIN VIEW — DARK
═══════════════════════════════════════════════════════ */
#admin-view { height: 100vh; overflow-y: auto; padding: 16px; display: none; }
.admin-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
.admin-title { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); }
.admin-topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.admin-group-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.atab { padding: 7px 18px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.atab.active,.atab:hover { background: var(--fire); border-color: var(--fire); color: white; }
.atab.ko-tab { border-color: rgba(240,180,41,.4); color: var(--gold); }
.atab.ko-tab.active { background: var(--gold); border-color: var(--gold); color: #1a1000; }
.atab.sp-tab { border-color: rgba(255,255,255,.15); color: var(--chalk); }
.atab.sp-tab.active { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.3); color: white; }
.admin-group-info { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.admin-match-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.admin-match { background: var(--surface); border: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.admin-match.is-live { border-color: var(--fire); box-shadow: inset 0 0 0 1px var(--fire); }
.admin-match.is-done { opacity: 0.65; }
.match-num { font-size: 10px; color: var(--muted); font-weight: 700; min-width: 20px; }
.admin-teams { flex: 1; font-size: 13px; line-height: 1.5; min-width: 120px; }
.admin-teams strong { font-weight: 700; color: var(--chalk); }
.admin-teams .vs { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.admin-teams .tbd-team { color: var(--muted); font-style: italic; }
.match-badge { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 3px 8px; flex-shrink: 0; }
.badge-pending { background: var(--raised); color: var(--muted); }
.badge-live    { background: var(--fire); color: white; }
.badge-done    { background: #1a3a28; color: var(--win); }
.live-scoring-ctrl { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; align-items: center; }
.score-summary { display: flex; gap: 6px; align-items: center; font-size: 11px; color: var(--muted); }
.score-summary .set-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; color: var(--fire); font-variant-numeric: tabular-nums; }
.score-summary .game-pts { font-size: 15px; font-weight: 700; color: var(--chalk); font-variant-numeric: tabular-nums; }
.point-btns { display: flex; gap: 6px; align-items: center; }
.point-btn { padding: 8px 14px; border: none; cursor: pointer; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: filter 0.1s; white-space: nowrap; }
.point-btn:hover:not(:disabled) { filter: brightness(1.2); }
.point-btn.t1 { background: var(--fire); color: white; }
.point-btn.t2 { background: #1a65a3; color: white; }
.point-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.ctrl-sep { font-size: 14px; color: var(--dim); }
.done-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: 24px; color: var(--chalk); min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; }
.match-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
.act-btn { padding: 6px 12px; border: none; cursor: pointer; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: filter 0.12s; white-space: nowrap; }
.act-btn:hover:not(:disabled) { filter: brightness(1.2); }
.act-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-golive  { background: var(--fire); color: white; }
.btn-save    { background: var(--win); color: #0a1f14; }
.btn-undo    { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-stop    { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-result  { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-display { background: var(--raised); color: var(--chalk); border: 1px solid var(--border); }
.btn-switch  { background: var(--raised); color: var(--gold); border: 1px solid rgba(240,180,41,.3); }
.btn-autofill { background: rgba(240,180,41,.15); color: var(--gold); border: 1px solid rgba(240,180,41,.3); }
.admin-standings { margin-top: 4px; }
.admin-standings-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; font-weight: 700; }
.admin-st-table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.admin-st-table th { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 7px 10px; text-align: center; background: var(--raised); font-weight: 700; }
.admin-st-table th:first-child { text-align: left; }
.admin-st-table td { padding: 9px 10px; font-size: 13px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; font-variant-numeric: tabular-nums; }
.admin-st-table td:first-child { text-align: left; font-weight: 600; }
.admin-st-table tbody tr:last-child td { border-bottom: none; }
.admin-st-table .pts { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; color: var(--fire); }
.ko-section-head { font-family: Impact,'Arial Narrow',sans-serif; font-size: 15px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); padding: 8px 0; border-bottom: 1px solid rgba(240,180,41,.2); margin-bottom: 10px; margin-top: 20px; }
.ko-section-head:first-child { margin-top: 0; }
.ko-admin-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
.ko-seeding-note { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
/* Sponsor admin */
.sp-row { background: var(--surface); border: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.sp-preview { height: 30px; width: 80px; object-fit: contain; flex-shrink: 0; background: rgba(255,255,255,.05); border: 1px dashed var(--border); }
.sp-input { flex: 1; background: var(--raised); border: 1px solid var(--border); color: var(--chalk); padding: 7px 10px; font-size: 12px; outline: none; }
.sp-input:focus { border-color: var(--fire); }
.sp-input::placeholder { color: var(--muted); }
.sp-remove { background: var(--raised); border: 1px solid var(--border); color: var(--loss); padding: 6px 10px; cursor: pointer; font-size: 11px; font-weight: 800; }
.sp-add { background: rgba(244,107,26,.15); border: 1px solid rgba(244,107,26,.3); color: var(--fire); padding: 8px 18px; cursor: pointer; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
.sp-upload-btn { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.18); color: var(--chalk); padding: 6px 12px; cursor: pointer; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
.sp-upload-btn:hover { background: rgba(255,255,255,.12); }
.sp-file-input { display: none; }
.sp-logo-label { font-size: 10px; color: var(--muted); flex-shrink: 0; }
</style>

<body>
<div id="root"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const FIREBASE_URL = 'https://padel-scoring-58d86-default-rtdb.asia-southeast1.firebasedatabase.app';
const TOURNAMENTS  = [
  { id: 'padel-july-2026',   label: 'Udaan Padel Open',   date: 'Jul 2026' },
  { id: 'padel-aug-2026',    label: 'Udaan Padel Open 2', date: 'Aug 2026' },
  { id: 'padel-sep-2026',    label: 'Udaan Padel Open 3', date: 'Sep 2026' },
];
const GROUPS = {
  A: { label:'Group A', letter:'A', date:'Sat 18 Jul', time:'4:00 – 6:30 PM',  color:'#f46b1a',
       teams:['Tushar & Udit','Angad & Chirag','Aviyank & Sam','Geetansh & Shaurya'] },
  B: { label:'Group B', letter:'B', date:'Sat 18 Jul', time:'6:30 – 9:00 PM',  color:'#e8a020',
       teams:['Abhinav & Udit','Varun M & Karan A','Karan & Dushyant','Rishi & Sahil'] },
  C: { label:'Group C', letter:'C', date:'Sat 18 Jul', time:'9:00 – 11:30 PM', color:'#f46b1a',
       teams:['Divyanshu & Vijay','Aashman & Aadi','Nishchay & Madhur','Bikram & Saharsh'] },
  D: { label:'Group D', letter:'D', date:'Sun 19 Jul', time:'3:00 – 5:30 PM',  color:'#e8a020',
       teams:['Harsh & Chirag','Ihit & Lakshya','Yajush & Arnav','Manish & Vishwas'] }
};
const KO_BRACKET = [
  {id:'qf1',round:'qf',label:'QF 1',date:'Sun 19 Jul',time:'5:30 PM'},
  {id:'qf2',round:'qf',label:'QF 2',date:'Sun 19 Jul',time:'5:30 PM'},
  {id:'qf3',round:'qf',label:'QF 3',date:'Sun 19 Jul',time:'5:30 PM'},
  {id:'qf4',round:'qf',label:'QF 4',date:'Sun 19 Jul',time:'5:30 PM'},
  {id:'sf1',round:'sf',label:'Semi Final 1',date:'Sun 19 Jul',time:'7:30 PM'},
  {id:'sf2',round:'sf',label:'Semi Final 2',date:'Sun 19 Jul',time:'7:30 PM'},
  {id:'final',round:'final',label:'Final',date:'Sun 19 Jul',time:'10:00 PM'},
];
function generateMatches() {
  const all=[];
  for (const [gk,g] of Object.entries(GROUPS))
    for (let i=0;i<g.teams.length;i++)
      for (let j=i+1;j<g.teams.length;j++)
        all.push({id:`${gk}${i}${j}`,group:gk,t1:i,t2:j});
  return all;
}
const MATCHES = generateMatches();
const POINT_LABELS = ['0','15','30','40'];

// ── FIREBASE ─────────────────────────────────────────────────────────────────
let currentTour = localStorage.getItem('udn_tour') || TOURNAMENTS[0].id;
let syncStatus = 'ok', saveTimer = null, es = null;
function dbPath() { return `${FIREBASE_URL}/${currentTour}.json`; }
function freshKO() { const ko={}; KO_BRACKET.forEach(m=>{ko[m.id]={t1:'',t2:''}}); return ko; }

async function pushToServer() {
  syncStatus='saving'; updateSyncDots();
  try {
    const res=await fetch(dbPath(),{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({results:S.results,live:S.live,ko:S.ko,sponsors:S.sponsors})});
    if(!res.ok) throw new Error(res.status);
    syncStatus='ok';
  } catch { syncStatus='error'; }
  saveTimer=null;
  updateSyncDots();
}
async function pullFromServer() {
  try { const r=await fetch(dbPath()); if(!r.ok) return null; return await r.json(); }
  catch { return null; }
}
function scheduleSave() { clearTimeout(saveTimer); saveTimer=setTimeout(pushToServer,400); }

function startRealtime() {
  if (es) return;
  es=new EventSource(dbPath());
  es.addEventListener('put',e=>{
    const {data}=JSON.parse(e.data); if(!data) return; if(saveTimer) return;
    S.results=data.results||{}; S.live=data.live||null;
    S.ko=data.ko||freshKO(); S.sponsors=data.sponsors||[];
    syncStatus='ok'; updateSyncDots();
    document.getElementById('root').innerHTML=S.view==='display'?renderDisplay():renderAdmin();
    attachHandlers();
  });
  es.onerror=()=>{syncStatus='error';updateSyncDots();};
}
function stopRealtime() { if(es){es.close();es=null;} }
function updateSyncDots() {
  document.querySelectorAll('.sync-dot').forEach(d=>d.className=`sync-dot ${syncStatus}`);
  document.querySelectorAll('.sync-text').forEach(t=>t.textContent=syncStatus==='ok'?'Live':syncStatus==='saving'?'Saving…':'Connection error');
}
async function switchTournament(id) {
  stopRealtime(); currentTour=id; localStorage.setItem('udn_tour',id);
  S.results={}; S.live=null; S.liveHistory=[]; S.ko=freshKO(); S.sponsors=[];
  const data=await pullFromServer();
  if(data){S.results=data.results||{};S.live=data.live||null;S.ko=data.ko||freshKO();S.sponsors=data.sponsors||[];}
  S.view='display'; render();
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  view:'display', adminGroup:'A', adminTab:'group', displayTab:'groups',
  results:{}, live:null, liveHistory:[],
  ko:freshKO(), sponsors:[], showTourPicker:false
};
function freshLive(id) {
  return {matchId:id,games:[0,0],points:[0,0],deuce:false,adv:null,goldenPoint:false,tiebreak:false,tbPoints:[0,0],setWinner:null};
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function awardPoint(team) {
  if(!S.live||S.live.setWinner!==null) return;
  S.liveHistory.push(JSON.stringify(S.live));
  if(S.liveHistory.length>50) S.liveHistory.shift();
  const L=S.live;
  if(L.tiebreak) {
    L.tbPoints[team]++;
    if(L.tbPoints[team]>=7&&L.tbPoints[team]-L.tbPoints[1-team]>=2){L.games[team]++;L.setWinner=team;}
    scheduleSave();render();return;
  }
  if(L.deuce) {
    if(L.goldenPoint)       { winGame(team); }
    else if(L.adv===null)   { L.adv=team; }
    else if(L.adv===team)   { winGame(team); }
    else { L.adv=null; L.goldenPoint=true; }
    scheduleSave();render();return;
  }
  L.points[team]++;
  if(L.points[0]>=3&&L.points[1]>=3){L.deuce=true;L.adv=null;L.goldenPoint=false;L.points=[3,3];scheduleSave();render();return;}
  if(L.points[team]>=4) winGame(team);
  scheduleSave();render();
}
function winGame(team) {
  const L=S.live;
  L.games[team]++;L.points=[0,0];L.deuce=false;L.adv=null;L.goldenPoint=false;L.tiebreak=false;L.tbPoints=[0,0];
  const[g0,g1]=L.games,max=Math.max(g0,g1);
  if(max>=6){
    if(max-Math.min(g0,g1)>=2&&max<=7){L.setWinner=g0>g1?0:1;return;}
    if(g0===6&&g1===6){L.tiebreak=true;L.tbPoints=[0,0];}
  }
}
function undoPoint() { if(!S.liveHistory.length)return; S.live=JSON.parse(S.liveHistory.pop()); scheduleSave();render(); }

// ── KO HELPERS ────────────────────────────────────────────────────────────────
function getKOTeams(id){const s=S.ko[id]||{t1:'',t2:''};return{t1:s.t1||'',t2:s.t2||''};}
function getKOMeta(id){return KO_BRACKET.find(m=>m.id===id);}
function koWinner(id){const r=S.results[id];if(!r)return null;const{t1,t2}=getKOTeams(id);return r.s1>r.s2?t1:t2;}
function propagateKOWinners(){
  const w=id=>koWinner(id);
  if(!S.ko.sf1)S.ko.sf1={t1:'',t2:''};
  if(!S.ko.sf2)S.ko.sf2={t1:'',t2:''};
  if(!S.ko.final)S.ko.final={t1:'',t2:''};
  if(w('qf1'))S.ko.sf1.t1=w('qf1');if(w('qf2'))S.ko.sf1.t2=w('qf2');
  if(w('qf3'))S.ko.sf2.t1=w('qf3');if(w('qf4'))S.ko.sf2.t2=w('qf4');
  if(w('sf1'))S.ko.final.t1=w('sf1');if(w('sf2'))S.ko.final.t2=w('sf2');
}
function autoFillQF(){
  const seed=k=>{const st=getStandings(k);return[st[0].team,st[1].team];};
  const[a1,a2]=seed('A'),[b1,b2]=seed('B'),[c1,c2]=seed('C'),[d1,d2]=seed('D');
  S.ko.qf1={t1:a1,t2:d2};S.ko.qf2={t1:b1,t2:c2};
  S.ko.qf3={t1:c1,t2:b2};S.ko.qf4={t1:d1,t2:a2};
  propagateKOWinners();scheduleSave();render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function inlineGameScore(L){
  if(L.setWinner!==null)return'–';
  if(L.tiebreak)return`TB ${L.tbPoints[0]}–${L.tbPoints[1]}`;
  if(L.deuce){if(L.goldenPoint)return'GOLDEN';return L.adv!==null?'ADV':'Deuce';}
  return`${POINT_LABELS[L.points[0]]}–${POINT_LABELS[L.points[1]]}`;
}
function getStandings(gk){
  const rows=GROUPS[gk].teams.map((t,i)=>({team:t,idx:i,pts:0,gw:0,gl:0,mp:0}));
  MATCHES.filter(m=>m.group===gk).forEach(m=>{
    const r=S.results[m.id];if(!r)return;
    const r1=rows[m.t1],r2=rows[m.t2];
    r1.mp++;r2.mp++;r1.gw+=r.s1;r1.gl+=r.s2;r2.gw+=r.s2;r2.gl+=r.s1;
    if(r.s1>r.s2)r1.pts+=3;else if(r.s2>r.s1)r2.pts+=3;
  });
  rows.forEach(r=>r.gd=r.gw-r.gl);
  return rows.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gw-a.gw||a.gl-b.gl);
}
function fmtClock(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtDate(){return new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();}
function tourLabel(){return TOURNAMENTS.find(t=>t.id===currentTour)?.label||currentTour;}
function getLiveTeams(){
  if(!S.live)return null;
  const id=S.live.matchId;
  const gm=MATCHES.find(m=>m.id===id);
  if(gm){const g=GROUPS[gm.group];return{t1:g.teams[gm.t1],t2:g.teams[gm.t2],context:`${g.label} · ${g.date} · ${g.time}`};}
  const km=getKOMeta(id);
  if(km){const{t1,t2}=getKOTeams(id);return{t1,t2,context:`${km.label} · ${km.date} · ${km.time}`};}
  return null;
}

// ── TOURNAMENT PICKER ─────────────────────────────────────────────────────────
function renderTourPicker(){
  return`<div class="modal-overlay" id="tour-picker">
  <div class="modal-box">
    <div class="modal-title">Select Tournament</div>
    <div class="modal-sub">All data is stored separately per tournament.</div>
    <div class="modal-label">Tournaments</div>
    <div class="tour-list">
      ${TOURNAMENTS.map(t=>`<div class="tour-item" data-action="pickTour" data-id="${t.id}">
        <div><div class="tour-item-name">${t.label}</div><div class="tour-item-date">${t.date}</div></div>
        <div class="tour-item-arrow">${t.id===currentTour?'✓':'›'}</div>
      </div>`).join('')}
    </div>
    <button class="modal-btn" style="background:var(--raised);color:var(--muted);border:1px solid var(--border)" data-action="closePicker">Cancel</button>
  </div>
</div>`;
}

// ── RENDER: DISPLAY ───────────────────────────────────────────────────────────
function renderDisplay(){
  const liveTeams=getLiveTeams(), showKO=S.displayTab==='knockout';
  return`
${S.showTourPicker?renderTourPicker():''}
<div id="display-view">
  ${courtSVG()}

  <!-- Banner -->
  <div class="d-banner">
    <div class="d-banner-left">
      ${udaanLogo(46)}
      <div style="margin-left:8px">
        <div class="d-banner-title">Udaan Padel Open</div>
        <div class="d-banner-sub">${showKO?'Knockout Stage · Sun 19 July':'Saturday 18 July · Group Stage · Top 8 to Quarter Finals'}</div>
      </div>
    </div>
    <div class="d-banner-right">
      <div class="d-stage-tabs">
        <button class="dstab ${!showKO?'active':''}" data-action="dispTab" data-tab="groups">Groups</button>
        <button class="dstab ${showKO?'active':''}" data-action="dispTab" data-tab="knockout">Knockout</button>
      </div>
      <div>
        <div class="d-clock" id="clock-el">${fmtClock()}</div>
        <div class="d-date">${fmtDate()}</div>
      </div>
    </div>
  </div>

  <!-- Live zone -->
  <div class="d-live-zone">
    <div class="d-live-board">
      ${liveTeams?renderDisplayLiveBoard(liveTeams):`
        <div class="d-live-eyebrow"><div class="d-live-label" style="color:rgba(255,255,255,.3)">No match in progress</div></div>
        <div class="d-no-match">Awaiting next match</div>
      `}
    </div>
  </div>

  <!-- Standings / KO -->
  <div class="d-standings-zone">
    ${showKO?renderKODisplay():`
    <div class="d-standings-grid">
      ${Object.keys(GROUPS).map(k=>renderDisplayGroupCard(k)).join('')}
    </div>`}
  </div>

  <!-- Sponsors strip -->
  <div class="d-sponsors">
    ${S.sponsors.length
      ? S.sponsors.map(sp=>sp.url
          ? `<div class="d-sponsor-item"><img class="d-sponsor-img" src="${sp.url}" alt="${sp.name}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/><div class="d-sponsor-text" style="display:none">${sp.name}</div></div>`
          : `<div class="d-sponsor-item"><div class="d-sponsor-text">${sp.name}</div></div>`
        ).join('')
      : `<div class="d-sponsor-empty">Sponsor logos appear here · Add via Admin → Sponsors</div>`
    }
  </div>
</div>
<div class="mode-fab"><button class="fab-btn" data-action="toAdmin">⚙ ADMIN</button></div>`;
}

function renderDisplayLiveBoard(liveTeams){
  const L=S.live, {t1,t2,context}=liveTeams;
  const p1=t1.split(' & '),p2=t2.split(' & ');
  const setDone=L.setWinner!==null, canUndo=S.liveHistory.length>0&&!setDone;
  let centerHtml='';
  if(setDone){
    const wname=(L.setWinner===0?t1:t2).split(' & ')[0];
    centerHtml=`<div class="d-status-big done">SET WON · ${wname}</div>`;
  } else if(L.tiebreak){
    centerHtml=`<div class="d-point-label">TIEBREAK</div>
    <div class="d-point-row">
      <div class="d-point-num tb">${L.tbPoints[0]}</div>
      <div class="d-point-dash">–</div>
      <div class="d-point-num tb">${L.tbPoints[1]}</div>
    </div>`;
  } else if(L.deuce){
    if(L.goldenPoint){
      centerHtml=`<div class="d-status-big golden">⚡ GOLDEN POINT</div>`;
    } else if(L.adv!==null){
      const advName=(L.adv===0?p1:p2)[0];
      centerHtml=`<div class="d-point-label">ADVANTAGE</div>
      <div class="d-point-row"><div class="d-point-num adv" style="min-width:auto;padding:0 16px">${advName}</div></div>`;
    } else {
      centerHtml=`<div class="d-status-big deuce">DEUCE</div>`;
    }
  } else {
    const pl=POINT_LABELS;
    centerHtml=`<div class="d-point-label">CURRENT GAME</div>
    <div class="d-point-row">
      <div class="d-point-num normal">${pl[L.points[0]]}</div>
      <div class="d-point-dash">–</div>
      <div class="d-point-num normal">${pl[L.points[1]]}</div>
    </div>`;
  }
  return`
<div class="d-live-eyebrow">
  ${setDone?'':`<div class="d-live-pip"></div>`}
  <div class="d-live-label" style="${setDone?'color:#f0b429':''}">${setDone?'MATCH COMPLETE':'LIVE'}</div>
  <div class="d-live-context">${context}</div>
</div>
<div class="d-score-layout">
  <div class="d-team-block left">${p1.map(n=>`<div class="d-team-player">${n}</div>`).join('')}</div>
  <div class="d-score-center">
    ${centerHtml}
    <div class="d-game-row">
      <div class="d-game-label">GAMES</div>
      <div class="d-game-num">${L.games[0]}</div>
      <div class="d-game-dash">–</div>
      <div class="d-game-num">${L.games[1]}</div>
    </div>
  </div>
  <div class="d-team-block right">${p2.map(n=>`<div class="d-team-player">${n}</div>`).join('')}</div>
</div>
<div class="d-score-btns">
  <button class="d-pt-btn t1" data-action="pt" data-team="0" ${setDone?'disabled':''}>+ ${p1.join(' & ')}</button>
  <button class="d-undo-btn" data-action="undo" ${!canUndo?'disabled':''}>↩ Undo</button>
  <button class="d-pt-btn t2" data-action="pt" data-team="1" ${setDone?'disabled':''}>+ ${p2.join(' & ')}</button>
</div>
${setDone?`<button class="d-save-btn" data-action="dispSave" data-id="${L.matchId}">💾 Save Result & Close</button>`:''}`;
}

// ── HANDLERS ──────────────────────────────────────────────────────────────────
function attachHandlers(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    const a=el.dataset.action;
    if(a==='spName') {
      el.addEventListener('input',()=>{
        S.sponsors[+el.dataset.si].name=el.value;
        scheduleSave();
      });
      return;
    }
    if(a==='spUpload') {
      el.addEventListener('change',()=>{
        const file=el.files[0]; if(!file) return;
        const i=+el.dataset.si;
        const reader=new FileReader();
        reader.onload=e=>{
          S.sponsors[i].url=e.target.result;
          if(!S.sponsors[i].name) S.sponsors[i].name=file.name.replace(/\.[^.]+$/,'');
          scheduleSave(); render();
        };
        reader.readAsDataURL(file);
      });
      return;
    }
    el.addEventListener('click',async()=>{
      if(a==='toAdmin')    {S.view='admin';S.adminTab='group';render();}
      if(a==='toDisplay')  {S.view='display';render();}
      if(a==='setGroup')   {S.adminGroup=el.dataset.group;S.adminTab='group';render();}
      if(a==='setKOTab')   {S.adminTab='knockout';render();}
      if(a==='setSPTab')   {S.adminTab='sponsors';render();}
      if(a==='dispTab')    {S.displayTab=el.dataset.tab;render();}
      if(a==='openPicker') {S.showTourPicker=true;render();}
      if(a==='closePicker'){S.showTourPicker=false;render();}
      if(a==='pickTour')   {S.showTourPicker=false;await switchTournament(el.dataset.id);}
      if(a==='goLive')   {S.live=freshLive(el.dataset.id);S.liveHistory=[];scheduleSave();render();}
      if(a==='stopLive') {S.live=null;S.liveHistory=[];scheduleSave();render();}
      if(a==='pt')       {awardPoint(+el.dataset.team);}
      if(a==='undo')     {undoPoint();}
      if(a==='save')     {S.results[el.dataset.id]={s1:S.live.games[0],s2:S.live.games[1]};S.live=null;S.liveHistory=[];scheduleSave();render();}
      if(a==='dispSave') {
        S.results[el.dataset.id]={s1:S.live.games[0],s2:S.live.games[1]};
        S.live=null;S.liveHistory=[];
        if(getKOMeta(el.dataset.id))propagateKOWinners();
        scheduleSave();render();
      }
      if(a==='undoResult')    {delete S.results[el.dataset.id];scheduleSave();render();}
      if(a==='autoFillQF')    {autoFillQF();}
      if(a==='koGoLive')      {S.live=freshLive(el.dataset.id);S.liveHistory=[];scheduleSave();render();}
      if(a==='koSave')        {S.results[el.dataset.id]={s1:S.live.games[0],s2:S.live.games[1]};S.live=null;S.liveHistory=[];propagateKOWinners();scheduleSave();render();}
      if(a==='koUndoResult')  {delete S.results[el.dataset.id];propagateKOWinners();scheduleSave();render();}
      if(a==='spAdd')         {S.sponsors.push({name:'',url:''});scheduleSave();render();}
      if(a==='spRemove')      {S.sponsors.splice(+el.dataset.si,1);scheduleSave();render();}
      if(a==='spClearLogo')   {S.sponsors[+el.dataset.si].url='';scheduleSave();render();}
    });
  });
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
setInterval(()=>{const el=document.getElementById('clock-el');if(el)el.textContent=fmtClock();},1000);

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('root').innerHTML=S.view==='display'?renderDisplay():renderAdmin();
  attachHandlers();
  startRealtime();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async()=>{
  const data=await pullFromServer();
  if(data){S.results=data.results||{};S.live=data.live||null;S.ko=data.ko||freshKO();S.sponsors=data.sponsors||[];}
  render();
})();
</script>
