<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Udaan Padel Open — Live Scoring</title>
<style>
:root {
  --pitch:   #0b0e12;
  --surface: #131820;
  --raised:  #1a2130;
  --border:  #252e3d;
  --fire:    #f46b1a;
  --gold:    #f0b429;
  --chalk:   #eef2f7;
  --muted:   #5a6475;
  --dim:     #323b4a;
  --win:     #2db87a;
  --loss:    #e05252;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--pitch); color: var(--chalk);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased;
}

/* ── TOURNAMENT PICKER MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 500; padding: 24px;
}
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-top: 3px solid var(--fire); padding: 32px 36px;
  width: 100%; max-width: 420px;
}
.modal-title {
  font-family: Impact,'Arial Narrow',sans-serif;
  font-size: 18px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--fire); margin-bottom: 6px;
}
.modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; letter-spacing: 0.5px; }
.modal-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.tour-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.tour-item {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--raised); border: 1px solid var(--border);
  padding: 10px 14px; cursor: pointer; transition: border-color 0.12s;
}
.tour-item:hover { border-color: var(--fire); }
.tour-item-name { font-size: 14px; font-weight: 600; }
.tour-item-date { font-size: 11px; color: var(--muted); }
.tour-item-arrow { color: var(--fire); font-size: 16px; }
.modal-divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
.modal-divider::before,.modal-divider::after { content:''; flex:1; height:1px; background:var(--border); }
.modal-divider span { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
.modal-input {
  width: 100%; background: var(--raised); border: 1px solid var(--border);
  color: var(--chalk); padding: 10px 14px; font-size: 13px; outline: none;
  transition: border-color 0.15s;
}
.modal-input:focus { border-color: var(--fire); }
.modal-input::placeholder { color: var(--muted); }
.modal-btn {
  width: 100%; padding: 11px; background: var(--fire); border: none;
  color: white; font-size: 12px; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: filter 0.15s;
}
.modal-btn:hover { filter: brightness(1.15); }

/* ── SYNC ── */
.sync-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.sync-dot.ok     { background: var(--win); }
.sync-dot.saving { background: var(--gold); animation: blink .8s ease-in-out infinite; }
.sync-dot.error  { background: var(--loss); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.sync-status { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; }

/* ── DISPLAY ── */
#display-view { height: 100vh; display: grid; grid-template-rows: auto auto 1fr; padding: 14px 16px 12px; gap: 12px; }
.banner { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--fire); }
.banner-left { display: flex; align-items: center; gap: 16px; }
.udaan-mark { width: 38px; height: 38px; background: var(--fire); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: white; flex-shrink: 0; }
.banner-title { font-family: Impact,'Arial Narrow',sans-serif; font-size: 22px; letter-spacing: 3px; text-transform: uppercase; line-height: 1; }
.banner-sub { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
.banner-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.clock { font-family: Impact,'Arial Narrow',sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--gold); font-variant-numeric: tabular-nums; line-height: 1; }
.clock-date { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

.live-board { background: var(--surface); border: 1px solid var(--border); padding: 14px 24px 16px; position: relative; }
.live-board::before { content:''; position: absolute; inset:0; border-left: 4px solid var(--fire); pointer-events: none; }
.live-eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.live-pip { width: 8px; height: 8px; background: var(--fire); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
.live-label-text { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); }
.live-context { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-left: auto; }

.score-stage { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; }
.team-block { display: flex; flex-direction: column; }
.team-block.left  { align-items: flex-end; text-align: right; }
.team-block.right { align-items: flex-start; }
.team-display-name { font-size: clamp(16px,2.2vw,28px); font-weight: 700; line-height: 1.1; }
.team-players { font-size: clamp(11px,1.2vw,15px); color: var(--muted); margin-top: 3px; }
.score-bug { display: flex; align-items: center; }
.score-digit { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(56px,10vw,110px); color: var(--fire); font-variant-numeric: tabular-nums; line-height: 1; min-width: clamp(60px,7vw,90px); text-align: center; text-shadow: 0 0 40px rgba(244,107,26,.35); }
.score-dash { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(36px,5vw,64px); color: var(--dim); padding: 0 8px; line-height: 1; }

.game-score-row { margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 16px; border-top: 1px solid var(--border); padding-top: 10px; }
.game-score-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
.game-score-value { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(20px,3.5vw,40px); font-variant-numeric: tabular-nums; letter-spacing: 2px; line-height: 1; }
.game-score-value.normal { color: var(--muted); }
.game-score-value.deuce  { color: var(--chalk); }
.game-score-value.adv    { color: var(--gold); }
.game-score-value.tb     { color: var(--gold); }
.game-score-value.done   { color: var(--win); font-size: clamp(14px,2vw,24px); letter-spacing: 3px; text-transform: uppercase; }
.no-match-msg { text-align: center; color: var(--muted); font-size: 14px; letter-spacing: 3px; text-transform: uppercase; padding: 8px 0; }

.standings-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; min-height: 0; overflow: hidden; }
.group-card { background: var(--surface); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.group-card-head { padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.group-letter { font-family: Impact,'Arial Narrow',sans-serif; font-size: 26px; line-height: 1; }
.group-label-text { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 1px; }
.group-schedule { font-size: 10px; color: var(--muted); text-align: right; line-height: 1.5; }
.group-table-wrap { flex: 1; overflow: hidden; }
.group-table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.group-table thead th { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 5px 8px; text-align: center; font-weight: 600; background: var(--raised); }
.group-table thead th:nth-child(2) { text-align: left; }
.group-table tbody td { padding: 7px 8px; font-size: 12px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
.group-table tbody tr:last-child td { border-bottom: none; }
.group-table tbody td:nth-child(2) { text-align: left; font-weight: 600; color: var(--chalk); }
.rank-cell { font-family: Impact,'Arial Narrow',sans-serif; font-size: 16px; color: var(--dim); width: 24px; }
.pts-cell  { font-family: Impact,'Arial Narrow',sans-serif; font-size: 18px; color: var(--fire); }
.gd-pos { color: var(--win); font-weight: 700; }
.gd-neg { color: var(--loss); font-weight: 700; }
.gd-zero { color: var(--muted); }
.top2 .rank-cell { color: var(--gold); }
.match-progress { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); text-align: center; padding: 5px 8px; border-top: 1px solid var(--border); flex-shrink: 0; }

/* ── KNOCKOUT DISPLAY ── */
.ko-display { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; min-height: 0; overflow: hidden; }
.ko-round-col { display: flex; flex-direction: column; gap: 0; min-height: 0; overflow: hidden; }
.ko-round-head { font-family: Impact,'Arial Narrow',sans-serif; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-bottom: none; text-align: center; flex-shrink: 0; }
.ko-round-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 6px; padding: 8px; background: var(--surface); border: 1px solid var(--border); }
.ko-match-card { background: var(--raised); border: 1px solid var(--border); padding: 7px 10px; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; min-height: 0; }
.ko-match-card.is-live { border-color: var(--fire); }
.ko-match-card.is-done { border-left: 3px solid var(--win); }
.ko-match-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.ko-team-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ko-team-name { font-size: clamp(9px,1vw,13px); font-weight: 700; color: var(--chalk); line-height: 1.2; flex: 1; }
.ko-team-name.winner { color: var(--gold); }
.ko-team-name.tbd { color: var(--muted); font-style: italic; font-weight: 400; }
.ko-team-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(14px,2vw,22px); color: var(--fire); font-variant-numeric: tabular-nums; min-width: 18px; text-align: right; }
.ko-team-score.winner { color: var(--gold); }
.ko-divider { height: 1px; background: var(--border); margin: 2px 0; }

.mode-fab { position: fixed; bottom: 14px; right: 14px; z-index: 200; }
.fab-btn { background: var(--raised); border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.fab-btn:hover { background: var(--border); color: var(--chalk); }

/* ── DISPLAY STAGE SWITCHER ── */
.display-stage-tabs { display: flex; gap: 0; }
.dstab { padding: 5px 14px; background: var(--raised); border: 1px solid var(--border); color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.dstab:first-child { border-right: none; }
.dstab.active { background: var(--fire); border-color: var(--fire); color: white; }

/* ── ADMIN ── */
#admin-view { height: 100vh; overflow-y: auto; padding: 16px; display: none; }
.admin-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
.admin-title { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); }
.admin-topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.admin-group-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.atab { padding: 7px 18px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.atab.active,.atab:hover { background: var(--fire); border-color: var(--fire); color: white; }
.atab.ko-tab { border-color: rgba(240,180,41,.4); color: var(--gold); }
.atab.ko-tab.active { background: var(--gold); border-color: var(--gold); color: #1a1000; }
.admin-group-info { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.admin-match-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.admin-match { background: var(--surface); border: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.admin-match.is-live { border-color: var(--fire); box-shadow: inset 0 0 0 1px var(--fire); }
.admin-match.is-done { opacity: 0.65; }
.match-num { font-size: 10px; color: var(--muted); font-weight: 700; min-width: 20px; }
.admin-teams { flex: 1; font-size: 13px; line-height: 1.5; min-width: 120px; }
.admin-teams strong { font-weight: 700; color: var(--chalk); }
.admin-teams .vs { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.admin-teams .tbd-team { color: var(--muted); font-style: italic; }
.match-badge { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 3px 8px; flex-shrink: 0; }
.badge-pending { background: var(--raised); color: var(--muted); }
.badge-live    { background: var(--fire); color: white; }
.badge-done    { background: #1a3a28; color: var(--win); }
.live-scoring-ctrl { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; align-items: center; }
.score-summary { display: flex; gap: 6px; align-items: center; font-size: 11px; color: var(--muted); }
.score-summary .set-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; color: var(--fire); font-variant-numeric: tabular-nums; }
.score-summary .game-pts { font-size: 15px; font-weight: 700; color: var(--chalk); font-variant-numeric: tabular-nums; }
.point-btns { display: flex; gap: 6px; align-items: center; }
.point-btn { padding: 8px 14px; border: none; cursor: pointer; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: filter 0.1s; white-space: nowrap; }
.point-btn:hover:not(:disabled) { filter: brightness(1.2); }
.point-btn.t1 { background: var(--fire); color: white; }
.point-btn.t2 { background: #1a65a3; color: white; }
.point-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.ctrl-sep { font-size: 14px; color: var(--dim); }
.done-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: 24px; color: var(--chalk); min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; }
.match-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
.act-btn { padding: 6px 12px; border: none; cursor: pointer; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: filter 0.12s; white-space: nowrap; }
.act-btn:hover:not(:disabled) { filter: brightness(1.2); }
.act-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-golive  { background: var(--fire); color: white; }
.btn-save    { background: var(--win); color: #0a1f14; }
.btn-undo    { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-stop    { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-result  { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-display { background: var(--raised); color: var(--chalk); border: 1px solid var(--border); }
.btn-switch  { background: var(--raised); color: var(--gold); border: 1px solid rgba(240,180,41,.3); }
.btn-autofill { background: rgba(240,180,41,.15); color: var(--gold); border: 1px solid rgba(240,180,41,.3); }

.admin-standings { margin-top: 4px; }
.admin-standings-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; font-weight: 700; }
.admin-st-table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.admin-st-table th { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 7px 10px; text-align: center; background: var(--raised); font-weight: 700; }
.admin-st-table th:first-child { text-align: left; }
.admin-st-table td { padding: 9px 10px; font-size: 13px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; font-variant-numeric: tabular-nums; }
.admin-st-table td:first-child { text-align: left; font-weight: 600; }
.admin-st-table tbody tr:last-child td { border-bottom: none; }
.admin-st-table .pts { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; color: var(--fire); }

/* ── KO ADMIN ── */
.ko-section-head { font-family: Impact,'Arial Narrow',sans-serif; font-size: 15px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); padding: 8px 0; border-bottom: 1px solid rgba(240,180,41,.2); margin-bottom: 10px; margin-top: 20px; }
.ko-section-head:first-child { margin-top: 0; }
.ko-admin-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
.ko-admin-info { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
.ko-seeding-note { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const FIREBASE_URL  = 'https://padel-scoring-58d86-default-rtdb.asia-southeast1.firebasedatabase.app';
const TOURNAMENTS   = [
  { id: 'padel-july-2026',   label: 'Udaan Padel Open',    date: 'Jul 2026' },
  { id: 'padel-aug-2026',    label: 'Udaan Padel Open 2',  date: 'Aug 2026' },
  { id: 'padel-sep-2026',    label: 'Udaan Padel Open 3',  date: 'Sep 2026' },
];
// ─────────────────────────────────────────────────────────────────────────────

const GROUPS = {
  A: { label:'Group A', letter:'A', date:'Sat 18 Jul', time:'4:00 – 6:30 PM',  color:'#c25e12',
       teams:['Tushar & Udit','Angad & Chirag','Aviyank & Sam','Geetansh & Shaurya'] },
  B: { label:'Group B', letter:'B', date:'Sat 18 Jul', time:'6:30 – 9:00 PM',  color:'#1a65a3',
       teams:['Abhinav & Udit','Varun M & Karan A','Karan & Dushyant','Rishi & Sahil'] },
  C: { label:'Group C', letter:'C', date:'Sat 18 Jul', time:'9:00 – 11:30 PM', color:'#6b2b9e',
       teams:['Divyanshu & Vijay','Aashman & Aadi','Nishchay & Madhur','Bikram & Saharsh'] },
  D: { label:'Group D', letter:'D', date:'Sun 19 Jul', time:'3:00 – 5:30 PM',  color:'#197a4a',
       teams:['Harsh & Chirag','Ihit & Lakshya','Yajush & Arnav','Manish & Vishwas'] }
};

// KO bracket: QF seeding 1v8,2v7,3v6,4v5
// Seeds 1-4 = A/B/C/D group winners; Seeds 5-8 = A/B/C/D runners-up
// QF1: S1(A1) vs S8(D2) | QF2: S2(B1) vs S7(C2) | QF3: S3(C1) vs S6(B2) | QF4: S4(D1) vs S5(A2)
const KO_BRACKET = [
  // QFs
  {id:'qf1', round:'qf', label:'QF 1', date:'Sun 19 Jul', time:'5:30 PM', sfSlot:null},
  {id:'qf2', round:'qf', label:'QF 2', date:'Sun 19 Jul', time:'5:30 PM', sfSlot:null},
  {id:'qf3', round:'qf', label:'QF 3', date:'Sun 19 Jul', time:'5:30 PM', sfSlot:null},
  {id:'qf4', round:'qf', label:'QF 4', date:'Sun 19 Jul', time:'5:30 PM', sfSlot:null},
  // SFs
  {id:'sf1', round:'sf', label:'Semi Final 1', date:'Sun 19 Jul', time:'7:30 PM'},
  {id:'sf2', round:'sf', label:'Semi Final 2', date:'Sun 19 Jul', time:'7:30 PM'},
  // Final
  {id:'final', round:'final', label:'Final', date:'Sun 19 Jul', time:'10:00 PM'},
];

function generateMatches() {
  const all = [];
  for (const [gk,g] of Object.entries(GROUPS))
    for (let i=0;i<g.teams.length;i++)
      for (let j=i+1;j<g.teams.length;j++)
        all.push({id:`${gk}${i}${j}`,group:gk,t1:i,t2:j});
  return all;
}
const MATCHES = generateMatches();
const POINT_LABELS = ['0','15','30','40'];

// ── FIREBASE ─────────────────────────────────────────────────────────────────

let currentTour = localStorage.getItem('udn_tour') || TOURNAMENTS[0].id;
let syncStatus  = 'ok';
let saveTimer   = null;
let es          = null;

function dbPath() { return `${FIREBASE_URL}/${currentTour}.json`; }

function freshKO() {
  const ko = {};
  KO_BRACKET.forEach(m => { ko[m.id] = {t1:'', t2:''}; });
  return ko;
}

async function pushToServer() {
  syncStatus = 'saving'; updateSyncDots();
  try {
    const res = await fetch(dbPath(), {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({results:S.results, live:S.live, ko:S.ko})
    });
    if (!res.ok) throw new Error(res.status);
    syncStatus = 'ok';
  } catch { syncStatus = 'error'; }
  updateSyncDots();
}

async function pullFromServer() {
  try {
    const res = await fetch(dbPath());
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushToServer, 400);
}

function startRealtime() {
  if (es) return;
  es = new EventSource(dbPath());
  es.addEventListener('put', e => {
    const {data} = JSON.parse(e.data);
    if (!data) return;
    if (saveTimer) return;
    S.results = data.results || {};
    S.live    = data.live    || null;
    S.ko      = data.ko     || freshKO();
    syncStatus = 'ok'; updateSyncDots();
    document.getElementById('root').innerHTML =
      S.view==='display' ? renderDisplay() : renderAdmin();
    attachHandlers();
  });
  es.onerror = () => { syncStatus='error'; updateSyncDots(); };
}

function stopRealtime() { if(es){es.close();es=null;} }

function updateSyncDots() {
  document.querySelectorAll('.sync-dot').forEach(d => d.className=`sync-dot ${syncStatus}`);
  document.querySelectorAll('.sync-text').forEach(t => {
    t.textContent = syncStatus==='ok'?'Live':syncStatus==='saving'?'Saving…':'Connection error';
  });
}

async function switchTournament(id) {
  stopRealtime();
  currentTour = id;
  localStorage.setItem('udn_tour', id);
  S.results={}; S.live=null; S.liveHistory=[]; S.ko=freshKO();
  const data = await pullFromServer();
  if (data) { S.results=data.results||{}; S.live=data.live||null; S.ko=data.ko||freshKO(); }
  S.view = 'display';
  render();
}

// ── STATE ─────────────────────────────────────────────────────────────────────

const S = {
  view:'display', adminGroup:'A', adminTab:'group',
  displayTab:'groups',
  results:{}, live:null, liveHistory:[],
  ko: freshKO(),
  showTourPicker:false
};

function freshLive(id) {
  return {matchId:id,games:[0,0],points:[0,0],deuce:false,adv:null,tiebreak:false,tbPoints:[0,0],setWinner:null};
}

// ── SCORING ───────────────────────────────────────────────────────────────────

function awardPoint(team) {
  if (!S.live || S.live.setWinner!==null) return;
  S.liveHistory.push(JSON.stringify(S.live));
  if (S.liveHistory.length>50) S.liveHistory.shift();
  const L=S.live;

  if (L.tiebreak) {
    L.tbPoints[team]++;
    const opp=1-team;
    if (L.tbPoints[team]>=7 && L.tbPoints[team]-L.tbPoints[opp]>=2) { L.games[team]++; L.setWinner=team; }
    scheduleSave(); render(); return;
  }
  if (L.deuce) {
    if (L.adv===null) L.adv=team;
    else if (L.adv===team) winGame(team);
    else L.adv=null;
    scheduleSave(); render(); return;
  }
  L.points[team]++;
  if (L.points[0]>=3 && L.points[1]>=3) { L.deuce=true; L.adv=null; L.points=[3,3]; scheduleSave(); render(); return; }
  if (L.points[team]>=4) winGame(team);
  scheduleSave(); render();
}

function winGame(team) {
  const L=S.live;
  L.games[team]++; L.points=[0,0]; L.deuce=false; L.adv=null; L.tiebreak=false; L.tbPoints=[0,0];
  const [g0,g1]=L.games, max=Math.max(g0,g1);
  if (max>=6) {
    if (max-Math.min(g0,g1)>=2 && max<=7) { L.setWinner=g0>g1?0:1; return; }
    if (g0===6&&g1===6) { L.tiebreak=true; L.tbPoints=[0,0]; }
  }
}

function undoPoint() {
  if (!S.liveHistory.length) return;
  S.live=JSON.parse(S.liveHistory.pop());
  scheduleSave(); render();
}

// ── KO HELPERS ────────────────────────────────────────────────────────────────

function getKOTeams(id) {
  const slot = S.ko[id] || {t1:'',t2:''};
  return {t1: slot.t1||'', t2: slot.t2||''};
}

function getKOMeta(id) {
  return KO_BRACKET.find(m=>m.id===id);
}

function koWinner(id) {
  const res = S.results[id];
  if (!res) return null;
  const {t1,t2} = getKOTeams(id);
  return res.s1>res.s2 ? t1 : t2;
}

function propagateKOWinners() {
  // QF winners → SF teams
  const w = id => koWinner(id);
  if (w('qf1') || w('qf2')) {
    if (!S.ko.sf1) S.ko.sf1={t1:'',t2:''};
    if (w('qf1')) S.ko.sf1.t1 = w('qf1');
    if (w('qf2')) S.ko.sf1.t2 = w('qf2');
  }
  if (w('qf3') || w('qf4')) {
    if (!S.ko.sf2) S.ko.sf2={t1:'',t2:''};
    if (w('qf3')) S.ko.sf2.t1 = w('qf3');
    if (w('qf4')) S.ko.sf2.t2 = w('qf4');
  }
  // SF winners → Final teams
  if (!S.ko.final) S.ko.final={t1:'',t2:''};
  if (w('sf1')) S.ko.final.t1 = w('sf1');
  if (w('sf2')) S.ko.final.t2 = w('sf2');
}

function autoFillQF() {
  // Seed 1=A1,2=B1,3=C1,4=D1, Seed 5=A2,6=B2,7=C2,8=D2
  const seed = k => {
    const st = getStandings(k);
    return [st[0].team, st[1].team];
  };
  const [a1,a2]=seed('A'), [b1,b2]=seed('B'), [c1,c2]=seed('C'), [d1,d2]=seed('D');
  S.ko.qf1 = {t1:a1, t2:d2}; // S1 vs S8
  S.ko.qf2 = {t1:b1, t2:c2}; // S2 vs S7
  S.ko.qf3 = {t1:c1, t2:b2}; // S3 vs S6
  S.ko.qf4 = {t1:d1, t2:a2}; // S4 vs S5
  propagateKOWinners();
  scheduleSave(); render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────

function gameScoreDisplay(L,t1,t2) {
  if (L.setWinner!==null) return {text:'SET COMPLETE',cls:'done'};
  if (L.tiebreak) return {text:`${L.tbPoints[0]}  –  ${L.tbPoints[1]}`,cls:'tb',label:'TIEBREAK'};
  if (L.deuce) {
    if (L.adv===0) return {text:`ADV: ${t1.split(' & ')[0]}`,cls:'adv'};
    if (L.adv===1) return {text:`ADV: ${t2.split(' & ')[0]}`,cls:'adv'};
    return {text:'DEUCE',cls:'deuce'};
  }
  return {text:`${POINT_LABELS[L.points[0]]}  –  ${POINT_LABELS[L.points[1]]}`,cls:'normal',label:'CURRENT GAME'};
}

function inlineGameScore(L) {
  if (L.setWinner!==null) return '–';
  if (L.tiebreak) return `TB ${L.tbPoints[0]}–${L.tbPoints[1]}`;
  if (L.deuce) return L.adv!==null?'ADV':'Deuce';
  return `${POINT_LABELS[L.points[0]]}–${POINT_LABELS[L.points[1]]}`;
}

function getStandings(gk) {
  const rows=GROUPS[gk].teams.map((t,i)=>({team:t,idx:i,pts:0,gw:0,gl:0,mp:0}));
  MATCHES.filter(m=>m.group===gk).forEach(m=>{
    const r=S.results[m.id]; if(!r) return;
    const r1=rows[m.t1],r2=rows[m.t2];
    r1.mp++;r2.mp++;
    r1.gw+=r.s1;r1.gl+=r.s2;r2.gw+=r.s2;r2.gl+=r.s1;
    if(r.s1>r.s2) r1.pts+=2; else if(r.s2>r.s1) r2.pts+=2; else {r1.pts++;r2.pts++;}
  });
  rows.forEach(r=>r.gd=r.gw-r.gl);
  return rows.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gw-a.gw||a.gl-b.gl);
}

function fmtClock(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtDate() {return new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});}
function tourLabel() { return TOURNAMENTS.find(t=>t.id===currentTour)?.label || currentTour; }

// ── LIVE MATCH LOOKUP ─────────────────────────────────────────────────────────

function getLiveTeams() {
  if (!S.live) return null;
  const id = S.live.matchId;
  const groupMatch = MATCHES.find(m=>m.id===id);
  if (groupMatch) {
    const g = GROUPS[groupMatch.group];
    return {t1:g.teams[groupMatch.t1], t2:g.teams[groupMatch.t2], context:`${g.label} · ${g.date} · ${g.time}`, isKO:false};
  }
  const koMeta = getKOMeta(id);
  if (koMeta) {
    const {t1,t2} = getKOTeams(id);
    return {t1, t2, context:`${koMeta.label} · ${koMeta.date} · ${koMeta.time}`, isKO:true};
  }
  return null;
}

    scoreSection=`<div class="live-scoring-ctrl">

  }
  const t1Label = t1 ? `<strong>${t1}</strong>` : `<span class="tbd-team">TBD</span>`;
  const t2Label = t2 ? `<strong>${t2}</strong>` : `<span class="tbd-team">TBD</span>`;
  return `
<div class="admin-match ${isLive?'is-live':''} ${isDone?'is-done':''}">
  <div class="match-num">${meta.label}</div>
  <div class="admin-teams">${t1Label}<div class="vs">vs</div>${t2Label}</div>
  ${badge}${scoreSection}
  <div class="match-actions">${actions}</div>
</div>`;
}

function renderAdminMatch(m,idx) {
  const g=GROUPS[m.group],t1=g.teams[m.t1],t2=g.teams[m.t2];
  const res=S.results[m.id],L=S.live;
  const isLive=L&&L.matchId===m.id,isDone=!!res;
  const badge=isLive?`<span class="match-badge badge-live">🔴 Live</span>`:isDone?`<span class="match-badge badge-done">✓ Done</span>`:`<span class="match-badge badge-pending">Pending</span>`;
  let scoreSection='',actions='';
  if (isLive) {
    const setDone=L.setWinner!==null,gs=inlineGameScore(L),canUndo=S.liveHistory.length>0&&!setDone;
    scoreSection=`<div class="live-scoring-ctrl">
      <div class="score-summary">
        <span class="set-score">${L.games[0]} – ${L.games[1]}</span>
        <span style="color:var(--muted)">GAMES</span><span style="color:var(--muted)">·</span>
        <span class="game-pts">${gs}</span>
      </div>
      <div class="point-btns">
        <button class="point-btn t1" data-action="pt" data-team="0" ${setDone?'disabled':''}>+ ${t1.split(' & ')[0]}</button>
        <div class="ctrl-sep">vs</div>
        <button class="point-btn t2" data-action="pt" data-team="1" ${setDone?'disabled':''}>+ ${t2.split(' & ')[0]}</button>
      </div>
    </div>`;
    actions=`
      <button class="act-btn btn-save" data-action="save" data-id="${m.id}" ${!setDone?'disabled':''}>💾 Save</button>
      <button class="act-btn btn-undo" data-action="undo" ${!canUndo?'disabled':''}>↩ Undo</button>
      <button class="act-btn btn-stop" data-action="stopLive">■ Stop</button>`;
  } else if (isDone) {
    scoreSection=`<div class="done-score">${res.s1} – ${res.s2}</div>`;
    actions=`<button class="act-btn btn-result" data-action="undoResult" data-id="${m.id}">↩ Undo</button>`;
  } else {
    const busy=L&&L.matchId!==m.id;
    actions=`<button class="act-btn btn-golive" data-action="goLive" data-id="${m.id}" ${busy?'disabled':''}>▶ Go Live</button>`;
  }
  return `
<div class="admin-match ${isLive?'is-live':''} ${isDone?'is-done':''}">
  <div class="match-num">${idx}</div>
  <div class="admin-teams"><strong>${t1}</strong><div class="vs">vs</div><strong>${t2}</strong></div>
  ${badge}${scoreSection}
  <div class="match-actions">${actions}</div>
</div>`;
}

// ── HANDLERS ──────────────────────────────────────────────────────────────────

function attachHandlers() {
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const a=el.dataset.action;
      if (a==='toAdmin')    { S.view='admin'; S.adminTab='group'; render(); }
      if (a==='toDisplay')  { S.view='display'; render(); }
      if (a==='setGroup')   { S.adminGroup=el.dataset.group; S.adminTab='group'; render(); }
      if (a==='setKOTab')   { S.adminTab='knockout'; render(); }
      if (a==='dispTab')    { S.displayTab=el.dataset.tab; render(); }
      if (a==='openPicker') { S.showTourPicker=true; render(); }
      if (a==='closePicker'){ S.showTourPicker=false; render(); }
      if (a==='pickTour')   { S.showTourPicker=false; await switchTournament(el.dataset.id); }

      // Group match actions
      if (a==='goLive')  { S.live=freshLive(el.dataset.id); S.liveHistory=[]; scheduleSave(); render(); }
      if (a==='stopLive'){ S.live=null; S.liveHistory=[]; scheduleSave(); render(); }
      if (a==='pt')      { awardPoint(+el.dataset.team); }
      if (a==='undo')    { undoPoint(); }
      if (a==='save')    {
        S.results[el.dataset.id]={s1:S.live.games[0],s2:S.live.games[1]};
        S.live=null; S.liveHistory=[]; scheduleSave(); render();
      }
      if (a==='undoResult') { delete S.results[el.dataset.id]; scheduleSave(); render(); }

      // KO match actions
      if (a==='autoFillQF') { autoFillQF(); }
      if (a==='koGoLive')  { S.live=freshLive(el.dataset.id); S.liveHistory=[]; scheduleSave(); render(); }
      if (a==='koSave')    {
        const id=el.dataset.id;
        S.results[id]={s1:S.live.games[0],s2:S.live.games[1]};
        S.live=null; S.liveHistory=[];
        propagateKOWinners();
        scheduleSave(); render();
      }
      if (a==='koUndoResult') {
        delete S.results[el.dataset.id];
        propagateKOWinners();
        scheduleSave(); render();
      }
    });
  });
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────

setInterval(()=>{const el=document.getElementById('clock-el');if(el)el.textContent=fmtClock();},1000);

// ── RENDER ────────────────────────────────────────────────────────────────────

function render() {
  document.getElementById('root').innerHTML =
    S.view==='display' ? renderDisplay() : renderAdmin();
  attachHandlers();
  if (S.view==='display') startRealtime();
  else stopRealtime();
}

// ── INIT ──────────────────────────────────────────────────────────────────────

(async ()=>{
  const data = await pullFromServer();
  if (data) {
    S.results = data.results || {};
    S.live    = data.live    || null;
    S.ko      = data.ko     || freshKO();
  }
  render();
})();
</script>
</body>
</html>
