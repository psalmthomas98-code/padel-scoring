<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Udaan Padel Open — Live Scoring</title>
<style>
/* ── DARK BASE (admin) ── */
:root {
  --pitch:   #0b0e12;
  --surface: #131820;
  --raised:  #1a2130;
  --border:  #252e3d;
  --fire:    #f46b1a;
  --gold:    #f0b429;
  --chalk:   #eef2f7;
  --muted:   #5a6475;
  --dim:     #323b4a;
  --win:     #2db87a;
  --loss:    #e05252;
  --navy:    #1a2d6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--pitch); color: var(--chalk);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 500; padding: 24px;
}
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-top: 3px solid var(--fire); padding: 32px 36px;
  width: 100%; max-width: 420px;
}
.modal-title { font-family: Impact,'Arial Narrow',sans-serif; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); margin-bottom: 6px; }
.modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.modal-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.tour-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.tour-item { display: flex; align-items: center; justify-content: space-between; background: var(--raised); border: 1px solid var(--border); padding: 10px 14px; cursor: pointer; transition: border-color 0.12s; }
.tour-item:hover { border-color: var(--fire); }
.tour-item-name { font-size: 14px; font-weight: 600; }
.tour-item-date { font-size: 11px; color: var(--muted); }
.tour-item-arrow { color: var(--fire); font-size: 16px; }
.modal-btn { width: 100%; padding: 11px; background: var(--fire); border: none; color: white; font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: filter 0.15s; }
.modal-btn:hover { filter: brightness(1.15); }

/* ── SYNC ── */
.sync-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.sync-dot.ok     { background: var(--win); }
.sync-dot.saving { background: var(--gold); animation: blink .8s ease-in-out infinite; }
.sync-dot.error  { background: var(--loss); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.sync-status { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; }

/* ── FAB ── */
.mode-fab { position: fixed; bottom: 14px; right: 14px; z-index: 200; }
.fab-btn { background: rgba(26,45,107,.9); border: 1px solid rgba(255,255,255,.2); color: white; padding: 8px 16px; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.fab-btn:hover { background: var(--navy); }

/* ══════════════════════════════════════════════════════
   DISPLAY VIEW — LIGHT MODE
══════════════════════════════════════════════════════ */
#display-view {
  height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr;
  gap: 10px;
  padding: 10px 12px 8px;
  background: #f0f3f9;
  color: #0d1b2a;
}

/* Banner */
.d-banner {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--navy); color: white;
  padding: 8px 18px 8px 12px;
  border-radius: 4px;
  box-shadow: 0 2px 12px rgba(26,45,107,.25);
}
.d-banner-left { display: flex; align-items: center; gap: 10px; }
.d-banner-title { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; line-height: 1; color: white; }
.d-banner-sub { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,.55); margin-top: 3px; }
.d-banner-right { display: flex; align-items: center; gap: 16px; }
.d-clock { font-family: Impact,'Arial Narrow',sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--gold); font-variant-numeric: tabular-nums; line-height: 1; }
.d-date { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.5); margin-top: 2px; text-align: right; }
.d-stage-tabs { display: flex; gap: 0; }
.dstab { padding: 5px 12px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.55); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.dstab:first-child { border-right: none; border-radius: 2px 0 0 2px; }
.dstab:last-child { border-radius: 0 2px 2px 0; }
.dstab.active { background: var(--fire); border-color: var(--fire); color: white; }

/* Live board */
.d-live-board {
  background: white;
  border-radius: 4px;
  box-shadow: 0 2px 16px rgba(26,45,107,.1);
  padding: 10px 16px 6px;
  position: relative;
  border-top: 4px solid var(--fire);
}
.d-live-eyebrow { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.d-live-pip { width: 7px; height: 7px; background: var(--fire); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
.d-live-label { font-size: 10px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); }
.d-live-context { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #7a8faa; margin-left: auto; }

/* Main score layout */
.d-score-layout { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }

/* Team blocks */
.d-team-block { display: flex; flex-direction: column; gap: 2px; }
.d-team-block.left  { align-items: flex-end; text-align: right; }
.d-team-block.right { align-items: flex-start; }
.d-team-player { font-size: clamp(13px,1.7vw,21px); font-weight: 800; color: #0d1b2a; line-height: 1.2; }
.d-team-player.adv-glow { color: var(--fire); }

/* Center: point score BIG, game score small */
.d-score-center { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.d-point-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #7a8faa; margin-bottom: 1px; }
.d-point-row { display: flex; align-items: center; }
.d-point-num { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(60px,10vw,120px); line-height: 1; font-variant-numeric: tabular-nums; min-width: clamp(65px,7vw,100px); text-align: center; }
.d-point-num.normal { color: #0d1b2a; }
.d-point-num.adv    { color: var(--fire); }
.d-point-num.tb     { color: var(--navy); }
.d-point-num.win    { color: var(--win); }
.d-point-dash { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(40px,6vw,76px); color: #c8d4e4; padding: 0 6px; line-height: 1; }
.d-status-big { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(20px,3.5vw,44px); letter-spacing: 3px; text-transform: uppercase; text-align: center; padding: 6px 20px; }
.d-status-big.deuce  { color: #0d1b2a; background: #f0f3f9; border: 2px solid #c8d4e4; }
.d-status-big.golden { color: white; background: var(--fire); }
.d-status-big.done   { color: white; background: var(--win); }

.d-game-row { display: flex; align-items: center; gap: 4px; margin-top: 2px; padding-top: 4px; border-top: 1px solid #e4e9f2; }
.d-game-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #7a8faa; }
.d-game-num { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(14px,2vw,24px); color: var(--fire); font-variant-numeric: tabular-nums; min-width: clamp(14px,1.8vw,22px); text-align: center; }
.d-game-dash { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(10px,1.4vw,16px); color: #c8d4e4; padding: 0 3px; line-height: 1; }

/* Scoring buttons on display */
.d-score-btns { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; margin-top: 6px; }
.d-pt-btn { padding: 8px 12px; border: none; cursor: pointer; font-size: clamp(11px,1.2vw,15px); font-weight: 800; letter-spacing: 1px; text-transform: uppercase; border-radius: 3px; transition: filter 0.1s; }
.d-pt-btn:hover:not(:disabled) { filter: brightness(0.9); }
.d-pt-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.d-pt-btn.t1 { background: var(--fire); color: white; }
.d-pt-btn.t2 { background: var(--navy); color: white; }
.d-undo-btn { padding: 8px 14px; border: 1px solid #c8d4e4; background: white; color: #7a8faa; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: background 0.12s; }
.d-undo-btn:hover:not(:disabled) { background: #f0f3f9; }
.d-undo-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.d-save-btn { display: block; width: 100%; margin-top: 5px; padding: 7px; border: none; background: #2db87a; color: white; font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 3px; }
.d-no-match { text-align: center; color: #7a8faa; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; padding: 10px 0; }

/* Standings grid */
.d-standings-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; min-height: 0; overflow: hidden; }
.d-group-card { background: white; border-radius: 4px; box-shadow: 0 1px 8px rgba(26,45,107,.08); display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.d-group-head { padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e4e9f2; flex-shrink: 0; }
.d-group-letter { font-family: Impact,'Arial Narrow',sans-serif; font-size: 22px; line-height: 1; }
.d-group-sub { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #7a8faa; margin-top: 1px; }
.d-group-time { font-size: 9px; color: #7a8faa; text-align: right; line-height: 1.5; }
.d-group-table-wrap { flex: 1; overflow: hidden; }
.d-group-table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.d-group-table thead th { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: #7a8faa; padding: 4px 7px; text-align: center; font-weight: 600; background: #f7f9fc; }
.d-group-table thead th:nth-child(2) { text-align: left; }
.d-group-table tbody td { padding: 5px 7px; font-size: 11px; border-bottom: 1px solid #f0f3f9; text-align: center; vertical-align: middle; }
.d-group-table tbody tr:last-child td { border-bottom: none; }
.d-group-table tbody td:nth-child(2) { text-align: left; font-weight: 700; color: #0d1b2a; }
.d-rank { font-family: Impact,'Arial Narrow',sans-serif; font-size: 14px; color: #c8d4e4; width: 20px; }
.d-pts  { font-family: Impact,'Arial Narrow',sans-serif; font-size: 16px; color: var(--fire); }
.d-top2 .d-rank { color: var(--gold); }
.d-gd-pos { color: #2db87a; font-weight: 700; }
.d-gd-neg { color: #e05252; font-weight: 700; }
.d-gd-zero { color: #7a8faa; }
.d-played { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: #7a8faa; text-align: center; padding: 3px 7px; border-top: 1px solid #f0f3f9; flex-shrink: 0; }
.d-results-wrap { border-top: 1px solid #f0f3f9; flex-shrink: 0; max-height: 68px; overflow: hidden; }
.d-result-row { display: flex; align-items: center; gap: 4px; padding: 2px 7px; border-bottom: 1px solid #f7f9fc; }
.d-result-row:last-child { border-bottom: none; }
.d-rt { font-size: 9px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.d-rs { font-family: Impact,'Arial Narrow',sans-serif; font-size: 12px; color: #0d1b2a; flex-shrink: 0; font-variant-numeric: tabular-nums; }

/* KO display (light) */
.d-ko-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; min-height: 0; overflow: hidden; }
.d-ko-col { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.d-ko-round-head { font-family: Impact,'Arial Narrow',sans-serif; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--navy); padding: 5px 10px; background: white; border-radius: 4px 4px 0 0; border: 1px solid #e4e9f2; border-bottom: none; text-align: center; flex-shrink: 0; }
.d-ko-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 5px; padding: 6px; background: white; border: 1px solid #e4e9f2; border-radius: 0 0 4px 4px; }
.d-ko-card { background: #f7f9fc; border: 1px solid #e4e9f2; border-radius: 3px; padding: 6px 8px; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-height: 0; }
.d-ko-card.is-live { border-color: var(--fire); background: #fff5f0; }
.d-ko-card.is-done { border-left: 3px solid #2db87a; }
.d-ko-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #7a8faa; margin-bottom: 2px; }
.d-ko-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.d-ko-name { font-size: clamp(8px,0.9vw,12px); font-weight: 700; color: #0d1b2a; flex: 1; line-height: 1.2; }
.d-ko-name.winner { color: var(--fire); }
.d-ko-name.tbd { color: #7a8faa; font-style: italic; font-weight: 400; }
.d-ko-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: clamp(12px,1.8vw,20px); color: var(--fire); font-variant-numeric: tabular-nums; }
.d-ko-score.winner { color: var(--navy); }
.d-ko-div { height: 1px; background: #e4e9f2; margin: 1px 0; }

/* ══════════════════════════════════════════════════════
   ADMIN VIEW — DARK
══════════════════════════════════════════════════════ */
#admin-view { height: 100vh; overflow-y: auto; padding: 16px; display: none; }
.admin-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
.admin-title { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); }
.admin-topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.admin-group-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.atab { padding: 7px 18px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.atab.active,.atab:hover { background: var(--fire); border-color: var(--fire); color: white; }
.atab.ko-tab { border-color: rgba(240,180,41,.4); color: var(--gold); }
.atab.ko-tab.active { background: var(--gold); border-color: var(--gold); color: #1a1000; }
.admin-group-info { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.admin-match-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.admin-match { background: var(--surface); border: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.admin-match.is-live { border-color: var(--fire); box-shadow: inset 0 0 0 1px var(--fire); }
.admin-match.is-done { opacity: 0.65; }
.match-num { font-size: 10px; color: var(--muted); font-weight: 700; min-width: 20px; }
.admin-teams { flex: 1; font-size: 13px; line-height: 1.5; min-width: 120px; }
.admin-teams strong { font-weight: 700; color: var(--chalk); }
.admin-teams .vs { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.admin-teams .tbd-team { color: var(--muted); font-style: italic; }
.match-badge { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 3px 8px; flex-shrink: 0; }
.badge-pending { background: var(--raised); color: var(--muted); }
.badge-live    { background: var(--fire); color: white; }
.badge-done    { background: #1a3a28; color: var(--win); }
.live-scoring-ctrl { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; align-items: center; }
.score-summary { display: flex; gap: 6px; align-items: center; font-size: 11px; color: var(--muted); }
.score-summary .set-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; color: var(--fire); font-variant-numeric: tabular-nums; }
.score-summary .game-pts { font-size: 15px; font-weight: 700; color: var(--chalk); font-variant-numeric: tabular-nums; }
.point-btns { display: flex; gap: 6px; align-items: center; }
.point-btn { padding: 8px 14px; border: none; cursor: pointer; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: filter 0.1s; white-space: nowrap; }
.point-btn:hover:not(:disabled) { filter: brightness(1.2); }
.point-btn.t1 { background: var(--fire); color: white; }
.point-btn.t2 { background: #1a65a3; color: white; }
.point-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.ctrl-sep { font-size: 14px; color: var(--dim); }
.done-score { font-family: Impact,'Arial Narrow',sans-serif; font-size: 24px; color: var(--chalk); min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; }
.match-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
.act-btn { padding: 6px 12px; border: none; cursor: pointer; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: filter 0.12s; white-space: nowrap; }
.act-btn:hover:not(:disabled) { filter: brightness(1.2); }
.act-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-golive  { background: var(--fire); color: white; }
.btn-save    { background: var(--win); color: #0a1f14; }
.btn-undo    { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-stop    { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-result  { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }
.btn-display { background: var(--raised); color: var(--chalk); border: 1px solid var(--border); }
.btn-switch  { background: var(--raised); color: var(--gold); border: 1px solid rgba(240,180,41,.3); }
.btn-autofill { background: rgba(240,180,41,.15); color: var(--gold); border: 1px solid rgba(240,180,41,.3); }
.admin-standings { margin-top: 4px; }
.admin-standings-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; font-weight: 700; }
.admin-st-table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.admin-st-table th { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 7px 10px; text-align: center; background: var(--raised); font-weight: 700; }
.admin-st-table th:first-child { text-align: left; }
.admin-st-table td { padding: 9px 10px; font-size: 13px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; font-variant-numeric: tabular-nums; }
.admin-st-table td:first-child { text-align: left; font-weight: 600; }
.admin-st-table tbody tr:last-child td { border-bottom: none; }
.admin-st-table .pts { font-family: Impact,'Arial Narrow',sans-serif; font-size: 20px; color: var(--fire); }
.ko-section-head { font-family: Impact,'Arial Narrow',sans-serif; font-size: 15px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); padding: 8px 0; border-bottom: 1px solid rgba(240,180,41,.2); margin-bottom: 10px; margin-top: 20px; }
.ko-section-head:first-child { margin-top: 0; }
.ko-admin-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
.ko-seeding-note { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>

<div id="root"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const FIREBASE_URL  = 'https://padel-scoring-58d86-default-rtdb.asia-southeast1.firebasedatabase.app';
const TOURNAMENTS   = [
  { id: 'padel-july-2026',   label: 'Udaan Padel Open',    date: 'Jul 2026' },
  { id: 'padel-aug-2026',    label: 'Udaan Padel Open 2',  date: 'Aug 2026' },
  { id: 'padel-sep-2026',    label: 'Udaan Padel Open 3',  date: 'Sep 2026' },
];

const GROUPS = {
  A: { label:'Group A', letter:'A', date:'Sat 18 Jul', time:'4:00 – 6:30 PM',  color:'#c25e12',
       teams:['Tushar & Udit','Angad & Chirag','Aviyank & Sam','Geetansh & Shaurya'] },
  B: { label:'Group B', letter:'B', date:'Sat 18 Jul', time:'6:30 – 9:00 PM',  color:'#1a65a3',

// ── FIREBASE ─────────────────────────────────────────────────────────────────

let currentTour = localStorage.getItem('udn_tour') || TOURNAMENTS[0].id;
let syncStatus  = 'ok';
let saveTimer   = null;
let es          = null;

function dbPath() { return `${FIREBASE_URL}/${currentTour}.json`; }

function freshKO() {
  const ko = {};
  KO_BRACKET.forEach(m => { ko[m.id] = {t1:'', t2:''}; });
  return ko;
}

async function pushToServer() {
  syncStatus = 'saving'; updateSyncDots();
  try {
    const res = await fetch(dbPath(), {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({results:S.results, live:S.live, ko:S.ko})
    });
    if (!res.ok) throw new Error(res.status);
    syncStatus = 'ok';
  } catch { syncStatus = 'error'; }
  updateSyncDots();
}

async function pullFromServer() {
  try {
    const res = await fetch(dbPath());
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushToServer, 400);
}

function startRealtime() {
  if (es) return;
  es = new EventSource(dbPath());
  es.addEventListener('put', e => {
    const {data} = JSON.parse(e.data);
    if (!data) return;
    if (saveTimer) return;
    S.results = data.results || {};
    S.live    = data.live    || null;
    S.ko      = data.ko     || freshKO();
    syncStatus = 'ok'; updateSyncDots();
    document.getElementById('root').innerHTML =
      S.view==='display' ? renderDisplay() : renderAdmin();
    attachHandlers();
  });
  es.onerror = () => { syncStatus='error'; updateSyncDots(); };
}

function stopRealtime() { if(es){es.close();es=null;} }

function updateSyncDots() {
  document.querySelectorAll('.sync-dot').forEach(d => d.className=`sync-dot ${syncStatus}`);
  document.querySelectorAll('.sync-text').forEach(t => {
    t.textContent = syncStatus==='ok'?'Live':syncStatus==='saving'?'Saving…':'Connection error';
  });
}

async function switchTournament(id) {
  stopRealtime();
  currentTour = id;
  localStorage.setItem('udn_tour', id);
  S.results={}; S.live=null; S.liveHistory=[]; S.ko=freshKO();
  const data = await pullFromServer();
  if (data) { S.results=data.results||{}; S.live=data.live||null; S.ko=data.ko||freshKO(); }
  S.view = 'display';
  render();
}

function freshLive(id) {

// ── SCORING ───────────────────────────────────────────────────────────────────

function awardPoint(team) {
  if (!S.live || S.live.setWinner!==null) return;
  S.liveHistory.push(JSON.stringify(S.live));
  if (S.liveHistory.length>50) S.liveHistory.shift();
  const L=S.live;

  if (L.tiebreak) {
    L.tbPoints[team]++;
    const opp=1-team;
    if (L.tbPoints[team]>=7 && L.tbPoints[team]-L.tbPoints[opp]>=2) { L.games[team]++; L.setWinner=team; }
    scheduleSave(); render(); return;
  }

  if (L.deuce) {
    if (L.goldenPoint) {
      winGame(team);                     // golden point: whoever scores wins immediately
    } else if (L.adv===null) {
      L.adv = team;                      // first score after deuce → advantage
    } else if (L.adv===team) {
      winGame(team);                     // advantage player scores again → wins
    } else {
      L.adv = null; L.goldenPoint = true; // other player scores → back to deuce, now golden
    }
    scheduleSave(); render(); return;
  }

  L.points[team]++;
  if (L.points[0]>=3 && L.points[1]>=3) {
    L.deuce=true; L.adv=null; L.goldenPoint=false; L.points=[3,3];
    scheduleSave(); render(); return;
  }
  if (L.points[team]>=4) winGame(team);
  scheduleSave(); render();
}

function winGame(team) {
  const L=S.live;
  L.games[team]++; L.points=[0,0]; L.deuce=false; L.adv=null; L.goldenPoint=false;
  L.tiebreak=false; L.tbPoints=[0,0];
  const [g0,g1]=L.games, max=Math.max(g0,g1);
  if (max>=6) {
    if (max-Math.min(g0,g1)>=2 && max<=7) { L.setWinner=g0>g1?0:1; return; }
    if (g0===6&&g1===6) { L.tiebreak=true; L.tbPoints=[0,0]; }
  }
}

function undoPoint() {
  if (!S.liveHistory.length) return;
  S.live=JSON.parse(S.liveHistory.pop());
  scheduleSave(); render();
}

// ── KO HELPERS ────────────────────────────────────────────────────────────────

function getKOTeams(id) { const s=S.ko[id]||{t1:'',t2:''}; return {t1:s.t1||'',t2:s.t2||''}; }
function getKOMeta(id)  { return KO_BRACKET.find(m=>m.id===id); }

function koWinner(id) {
  const res=S.results[id]; if(!res) return null;
  const {t1,t2}=getKOTeams(id);
  return res.s1>res.s2?t1:t2;
}

function propagateKOWinners() {
  const w=id=>koWinner(id);
  if (!S.ko.sf1) S.ko.sf1={t1:'',t2:''};
  if (!S.ko.sf2) S.ko.sf2={t1:'',t2:''};
  if (!S.ko.final) S.ko.final={t1:'',t2:''};
  if (w('qf1')) S.ko.sf1.t1=w('qf1');
  if (w('qf2')) S.ko.sf1.t2=w('qf2');
  if (w('qf3')) S.ko.sf2.t1=w('qf3');
  if (w('qf4')) S.ko.sf2.t2=w('qf4');
  if (w('sf1')) S.ko.final.t1=w('sf1');
  if (w('sf2')) S.ko.final.t2=w('sf2');
}

function autoFillQF() {
  const seed=k=>{const st=getStandings(k);return[st[0].team,st[1].team];};
  const [a1,a2]=seed('A'),[b1,b2]=seed('B'),[c1,c2]=seed('C'),[d1,d2]=seed('D');
  S.ko.qf1={t1:a1,t2:d2}; S.ko.qf2={t1:b1,t2:c2};
  S.ko.qf3={t1:c1,t2:b2}; S.ko.qf4={t1:d1,t2:a2};
  propagateKOWinners(); scheduleSave(); render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────

function inlineGameScore(L) {
  if (L.setWinner!==null) return '–';
  if (L.tiebreak) return `TB ${L.tbPoints[0]}–${L.tbPoints[1]}`;
  if (L.deuce) {
    if (L.goldenPoint) return 'GOLDEN';
    return L.adv!==null?'ADV':'Deuce';
  }
  return `${POINT_LABELS[L.points[0]]}–${POINT_LABELS[L.points[1]]}`;
}

function getStandings(gk) {
  const rows=GROUPS[gk].teams.map((t,i)=>({team:t,idx:i,pts:0,gw:0,gl:0,mp:0}));
  MATCHES.filter(m=>m.group===gk).forEach(m=>{
    const r=S.results[m.id]; if(!r) return;
    const r1=rows[m.t1],r2=rows[m.t2];
    r1.mp++;r2.mp++;
    r1.gw+=r.s1;r1.gl+=r.s2;r2.gw+=r.s2;r2.gl+=r.s1;
    if(r.s1>r.s2) r1.pts+=2; else if(r.s2>r.s1) r2.pts+=2; else{r1.pts++;r2.pts++;}
  });
  rows.forEach(r=>r.gd=r.gw-r.gl);
  return rows.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gw-a.gw||a.gl-b.gl);
}

function fmtClock(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtDate() {return new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});}
function tourLabel() { return TOURNAMENTS.find(t=>t.id===currentTour)?.label||currentTour; }

function getLiveTeams() {
  if (!S.live) return null;
  const id=S.live.matchId;
  const gm=MATCHES.find(m=>m.id===id);
  if (gm) { const g=GROUPS[gm.group]; return {t1:g.teams[gm.t1],t2:g.teams[gm.t2],context:`${g.label} · ${g.date} · ${g.time}`}; }
  const km=getKOMeta(id);
  if (km) { const {t1,t2}=getKOTeams(id); return {t1,t2,context:`${km.label} · ${km.date} · ${km.time}`}; }
  return null;
}

${S.showTourPicker?renderTourPicker():''}
<div id="admin-view" style="display:block">
  <div class="admin-topbar">
    <div>
      <div class="admin-title">⚙ Admin</div>
      <div style="font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:3px">${tourLabel()}</div>
    </div>
    <div class="admin-topbar-right">
      <div class="sync-status"><span class="sync-dot ${syncStatus}"></span><span class="sync-text">${syncStatus==='ok'?'Live':syncStatus==='saving'?'Saving…':'Connection error'}</span></div>
      <button class="act-btn btn-switch" data-action="openPicker">⇄ Switch Tournament</button>
      <button class="act-btn btn-display" data-action="toDisplay">📺 Display</button>
    </div>
  </div>
  <div class="admin-group-tabs">
    ${Object.keys(GROUPS).map(k=>`<button class="atab ${!isKOTab&&k===S.adminGroup?'active':''}" data-action="setGroup" data-group="${k}">${GROUPS[k].label}</button>`).join('')}
    <button class="atab ko-tab ${isKOTab?'active':''}" data-action="setKOTab">🏆 Knockout</button>
  </div>
  ${isKOTab?renderKnockoutAdmin():renderGroupAdmin(g,standings)}
</div>
<div class="mode-fab"><button class="fab-btn" data-action="toDisplay">📺 DISPLAY</button></div>`;
}

function renderGroupAdmin(g, standings) {
  return `
  <div class="admin-group-info">${g.date} &nbsp;·&nbsp; ${g.time}</div>
  <div class="admin-match-list">
    ${MATCHES.filter(m=>m.group===S.adminGroup).map((m,i)=>renderAdminMatch(m,i+1)).join('')}
  </div>
  <div class="admin-standings">
    <div class="admin-standings-title">Standings — ${g.label}</div>
    <table class="admin-st-table">
      <thead><tr><th>Team</th><th>MP</th><th>Pts</th><th>GW</th><th>GL</th><th>GD</th></tr></thead>
      <tbody>
        ${standings.map((row,i)=>{const gd=row.gd,gc=gd>0?'var(--win)':gd<0?'var(--loss)':'var(--muted)';return`<tr>
          <td style="color:${i<2?'var(--chalk)':'var(--muted)'};font-weight:${i<2?700:400}">${row.team}</td>
          <td style="color:var(--muted)">${row.mp}</td><td class="pts">${row.pts}</td>
          <td style="color:var(--win)">${row.gw}</td><td style="color:var(--loss)">${row.gl}</td>
          <td style="color:${gc}">${gd>0?'+':''}${gd}</td>
        </tr>`;}).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderKnockoutAdmin() {
  return `
  <div class="ko-admin-top">
    <div>
      <div class="admin-standings-title" style="margin-bottom:4px">Knockout Stage · Sun 19 July</div>
      <div class="ko-seeding-note">Seeding: 1v8 · 2v7 · 3v6 · 4v5 (Group winners = Seeds 1–4)</div>
    </div>
    <button class="act-btn btn-autofill" data-action="autoFillQF">⚡ Auto-fill QF from Standings</button>
  </div>
  <div class="ko-section-head">Quarter Finals — 5:30 PM</div>
  <div class="admin-match-list">${['qf1','qf2','qf3','qf4'].map((id,i)=>renderKOAdminMatch(id,i+1)).join('')}</div>
  <div class="ko-section-head">Semi Finals — 7:30 PM</div>
  <div class="admin-match-list">${['sf1','sf2'].map((id,i)=>renderKOAdminMatch(id,i+1)).join('')}</div>
  <div class="ko-section-head" style="color:var(--gold)">Final — 10:00 PM</div>
  <div class="admin-match-list">${renderKOAdminMatch('final',1)}</div>`;
}

function renderKOAdminMatch(id,idx) {
  const meta=getKOMeta(id), {t1,t2}=getKOTeams(id);
  const res=S.results[id], L=S.live;
  const isLive=L&&L.matchId===id, isDone=!!res;
  const canGoLive=t1&&t2&&!isDone&&!(L&&L.matchId!==id);
  const badge=isLive?`<span class="match-badge badge-live">🔴 Live</span>`:isDone?`<span class="match-badge badge-done">✓ Done</span>`:`<span class="match-badge badge-pending">Pending</span>`;
  let scoreSection='',actions='';
  if (isLive) {
    const setDone=L.setWinner!==null, gs=inlineGameScore(L), canUndo=S.liveHistory.length>0&&!setDone;
    scoreSection=`<div class="live-scoring-ctrl">
      <div class="score-summary">
        <span class="set-score">${L.games[0]} – ${L.games[1]}</span>
        <span style="color:var(--muted)">·</span><span class="game-pts">${gs}</span>
      </div>
      <div class="point-btns">
        <button class="point-btn t1" data-action="pt" data-team="0" ${setDone?'disabled':''}>${(t1||'T1').split(' & ')[0]} +</button>
        <div class="ctrl-sep">vs</div>
        <button class="point-btn t2" data-action="pt" data-team="1" ${setDone?'disabled':''}>${(t2||'T2').split(' & ')[0]} +</button>
      </div>
    </div>`;
    actions=`
      <button class="act-btn btn-save" data-action="koSave" data-id="${id}" ${!setDone?'disabled':''}>💾 Save</button>
      <button class="act-btn btn-undo" data-action="undo" ${!canUndo?'disabled':''}>↩ Undo</button>
      <button class="act-btn btn-stop" data-action="stopLive">■ Stop</button>`;
  } else if (isDone) {
    scoreSection=`<div class="done-score">${res.s1} – ${res.s2}</div>`;
    actions=`<button class="act-btn btn-result" data-action="koUndoResult" data-id="${id}">↩ Undo</button>`;
  } else {
    actions=`<button class="act-btn btn-golive" data-action="koGoLive" data-id="${id}" ${!canGoLive?'disabled':''}>▶ Go Live</button>`;
  }
  const t1L=t1?`<strong>${t1}</strong>`:`<span class="tbd-team">TBD</span>`;
  const t2L=t2?`<strong>${t2}</strong>`:`<span class="tbd-team">TBD</span>`;
  return `<div class="admin-match ${isLive?'is-live':''} ${isDone?'is-done':''}">
  <div class="match-num">${meta.label}</div>
  <div class="admin-teams">${t1L}<div class="vs">vs</div>${t2L}</div>
  ${badge}${scoreSection}
  <div class="match-actions">${actions}</div>
</div>`;
}

function renderAdminMatch(m,idx) {
  const g=GROUPS[m.group], t1=g.teams[m.t1], t2=g.teams[m.t2];
  const res=S.results[m.id], L=S.live;
  const isLive=L&&L.matchId===m.id, isDone=!!res;
  const badge=isLive?`<span class="match-badge badge-live">🔴 Live</span>`:isDone?`<span class="match-badge badge-done">✓ Done</span>`:`<span class="match-badge badge-pending">Pending</span>`;
  let scoreSection='',actions='';
  if (isLive) {
    const setDone=L.setWinner!==null, gs=inlineGameScore(L), canUndo=S.liveHistory.length>0&&!setDone;
    scoreSection=`<div class="live-scoring-ctrl">
      <div class="score-summary">
        <span class="set-score">${L.games[0]} – ${L.games[1]}</span>
        <span style="color:var(--muted)">·</span><span class="game-pts">${gs}</span>
      </div>
      <div class="point-btns">
        <button class="point-btn t1" data-action="pt" data-team="0" ${setDone?'disabled':''}>+ ${t1.split(' & ')[0]}</button>
        <div class="ctrl-sep">vs</div>
        <button class="point-btn t2" data-action="pt" data-team="1" ${setDone?'disabled':''}>+ ${t2.split(' & ')[0]}</button>
      </div>
    </div>`;
    actions=`
      <button class="act-btn btn-save" data-action="save" data-id="${m.id}" ${!setDone?'disabled':''}>💾 Save</button>
      <button class="act-btn btn-undo" data-action="undo" ${!canUndo?'disabled':''}>↩ Undo</button>
      <button class="act-btn btn-stop" data-action="stopLive">■ Stop</button>`;
  } else if (isDone) {
    scoreSection=`<div class="done-score">${res.s1} – ${res.s2}</div>`;
    actions=`<button class="act-btn btn-result" data-action="undoResult" data-id="${m.id}">↩ Undo</button>`;
  } else {
    const busy=L&&L.matchId!==m.id;
    actions=`<button class="act-btn btn-golive" data-action="goLive" data-id="${m.id}" ${busy?'disabled':''}>▶ Go Live</button>`;
  }
  return `<div class="admin-match ${isLive?'is-live':''} ${isDone?'is-done':''}">
  <div class="match-num">${idx}</div>
  <div class="admin-teams"><strong>${t1}</strong><div class="vs">vs</div><strong>${t2}</strong></div>
  ${badge}${scoreSection}
  <div class="match-actions">${actions}</div>
</div>`;
}

// ── HANDLERS ──────────────────────────────────────────────────────────────────

function attachHandlers() {
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const a=el.dataset.action;
      if (a==='toAdmin')    { S.view='admin'; S.adminTab='group'; render(); }
      if (a==='toDisplay')  { S.view='display'; render(); }
      if (a==='setGroup')   { S.adminGroup=el.dataset.group; S.adminTab='group'; render(); }
      if (a==='setKOTab')   { S.adminTab='knockout'; render(); }
      if (a==='dispTab')    { S.displayTab=el.dataset.tab; render(); }
      if (a==='openPicker') { S.showTourPicker=true; render(); }
      if (a==='closePicker'){ S.showTourPicker=false; render(); }
      if (a==='pickTour')   { S.showTourPicker=false; await switchTournament(el.dataset.id); }
      if (a==='goLive')   { S.live=freshLive(el.dataset.id); S.liveHistory=[]; scheduleSave(); render(); }
      if (a==='stopLive') { S.live=null; S.liveHistory=[]; scheduleSave(); render(); }
      if (a==='pt')       { awardPoint(+el.dataset.team); }
      if (a==='undo')     { undoPoint(); }
      if (a==='save') {
        S.results[el.dataset.id]={s1:S.live.games[0],s2:S.live.games[1]};
        S.live=null; S.liveHistory=[]; scheduleSave(); render();
      }
      if (a==='dispSave') {
        S.results[el.dataset.id]={s1:S.live.games[0],s2:S.live.games[1]};
        S.live=null; S.liveHistory=[];
        if (getKOMeta(el.dataset.id)) propagateKOWinners();
        scheduleSave(); render();
      }
      if (a==='undoResult') { delete S.results[el.dataset.id]; scheduleSave(); render(); }
      if (a==='autoFillQF') { autoFillQF(); }
      if (a==='koGoLive')   { S.live=freshLive(el.dataset.id); S.liveHistory=[]; scheduleSave(); render(); }
      if (a==='koSave') {
        S.results[el.dataset.id]={s1:S.live.games[0],s2:S.live.games[1]};
        S.live=null; S.liveHistory=[]; propagateKOWinners(); scheduleSave(); render();
      }
      if (a==='koUndoResult') { delete S.results[el.dataset.id]; propagateKOWinners(); scheduleSave(); render(); }
    });
  });
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────

setInterval(()=>{const el=document.getElementById('clock-el');if(el)el.textContent=fmtClock();},1000);

// ── RENDER ────────────────────────────────────────────────────────────────────

function render() {
  document.getElementById('root').innerHTML =
    S.view==='display' ? renderDisplay() : renderAdmin();
  attachHandlers();
  if (S.view==='display') startRealtime();
  else stopRealtime();
}

// ── INIT ──────────────────────────────────────────────────────────────────────

(async ()=>{
  const data=await pullFromServer();
  if (data) { S.results=data.results||{}; S.live=data.live||null; S.ko=data.ko||freshKO(); }
  render();
})();
</script>
</body>
</html>
